<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tuyệt Chiêu 2: Phân Tích Cấu Tạo Số — Chiến Binh Toán</title>
    <link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary:        #C8960C;
            --primary-glow:   rgba(200,150,12,0.40);
            --secondary:      #C0332E;
            --secondary-glow: rgba(192,51,46,0.35);
            --success:        #5ABCAA;
            --success-glow:   rgba(90,188,170,0.30);
            --danger:         #C0332E;
            --copper:         #B87333;
            --copper-glow:    rgba(184,115,51,0.30);
            --bg-void:        #07040A;
            --bg-deep:        #0F0A14;
            --bg-panel:       #160E1C;
            --bg-card:        #1E1327;
            --bg-lift:        #261A30;
            --bg-base:        #07040A;
            --text-main:      #F5EED6;
            --text-muted:     #A08C70;
            --border:         rgba(184,115,51,0.40);
            --font-title:     'Philosopher', serif;
            --font-body:      'Lora', serif;
            --font-mono:      'Roboto Mono', monospace;
            /* Legacy aliases */
            --bg-color:       #07040A;
            --card-bg:        #1E1327;
            --warning:        #C8960C;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-void);
            background-image:
                linear-gradient(rgba(7,4,10,0.45) 0%, rgba(7,4,10,0.82) 60%, rgba(7,4,10,0.97) 100%),
                url('design-system/characters/boss/ho-tinh-portrait.jpg');
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            padding: 15px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(7,4,10,0.85) 0%, rgba(7,4,10,0) 100%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 0 15px var(--copper-glow);
            z-index: 10;
        }

        h1 {
            font-family: var(--font-title);
            margin: 0;
            font-size: clamp(13px, 3.8vw, 22px);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--primary-glow);
            line-height: 1.3;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .score-text { color: var(--success); text-shadow: 0 0 10px var(--success-glow); }
        .time-text { color: var(--secondary); text-shadow: 0 0 10px var(--secondary-glow); }
        .progress-text { color: var(--primary); text-align: center; margin-top: 5px; font-weight: bold; font-family: var(--font-mono); font-size: 16px;}

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .number-display-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-number {
            font-family: var(--font-mono);
            font-size: 5rem;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow);
            letter-spacing: 10px;
        }

        .targets-container {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 5;
        }

        .target-box {
            width: 80px;
            height: 120px;
            border: 2px dashed rgba(184,115,51,0.4);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-muted);
            background: rgba(30,19,39,0.5);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .target-left {
            border-color: var(--secondary);
            color: var(--secondary);
            text-shadow: 0 0 15px var(--secondary-glow);
            box-shadow: inset 0 0 20px rgba(192,51,46,0.2);
        }

        .target-right {
            border-color: var(--primary);
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            box-shadow: inset 0 0 20px rgba(200,150,12,0.15);
        }

        .deck-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 340px;
            perspective: 1000px;
            z-index: 10;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-lift));
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-mono);
            font-weight: bold;
            font-size: 2.2rem;
            text-align: center;
            padding: 20px;
            text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 0 2px var(--border);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease, opacity 0.3s ease;
            cursor: pointer;
            line-height: 1.3;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            z-index: -1;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 3D Stack positions */
        .card[data-index="0"] { /* Top card */
            transform: translateY(0) scale(1);
            z-index: 3;
            filter: brightness(1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 2px var(--copper);
        }
        .card[data-index="1"] { /* Middle card */
            transform: translateY(30px) scale(0.9);
            z-index: 2;
            filter: brightness(0.6);
            pointer-events: none;
        }
        .card[data-index="2"] { /* Bottom card */
            transform: translateY(60px) scale(0.8);
            z-index: 1;
            filter: brightness(0.3);
            pointer-events: none;
        }

        /* Card specific colors */
        .card.type-tram { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); border-bottom: 5px solid var(--primary); }
        .card.type-chuc { color: var(--success); text-shadow: 0 0 15px var(--success-glow); border-bottom: 5px solid var(--success); }
        .card.type-donvi { color: var(--copper); text-shadow: 0 0 15px var(--copper-glow); border-bottom: 5px solid var(--copper); }

        .feedback {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-mono);
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            text-align: center;
        }

        .feedback.show {
            animation: popOut 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }

        .bottom-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(7,4,10,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        
        .overlay.hidden {
            display: none;
        }

        .start-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: var(--font-mono);
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: transform 0.1s, box-shadow 0.1s;
            margin-top: 20px;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .card.swipe-left { animation: swipeLeftAnim 0.5s forwards; }
        .card.swipe-right { animation: swipeRightAnim 0.5s forwards; }
        .card.swipe-out { animation: fadeOutDown 0.3s forwards; } /* when tapped */

        @keyframes swipeLeftAnim {
            to { transform: translate(-200px, 50px) rotate(-30deg) scale(0.5); opacity: 0; }
        }
        @keyframes swipeRightAnim {
            to { transform: translate(200px, 50px) rotate(30deg) scale(0.5); opacity: 0; }
        }
        @keyframes fadeOutDown {
            to { transform: translateY(100px) scale(0.8); opacity: 0; }
        }
        
        .win-bg {
            background: linear-gradient(rgba(7,4,10,0.45), rgba(7,4,10,0.88)), url('design-system/characters/npc/thay-long/thay-long-portrait.jpg') !important;
            background-size: cover !important;
            background-position: center top !important;
        }

        .lose-bg {
            background: linear-gradient(rgba(7,4,10,0.55), rgba(7,4,10,0.95)), url('design-system/characters/boss/ho-tinh-portrait.jpg') !important;
            background-size: cover !important;
            background-position: center top !important;
        }
        
        .yt-btn {
            background: #ff0000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: var(--font-mono);
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            transition: transform 0.1s;
        }

        .yt-btn:active {
            transform: scale(0.95);
        }

        .video-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-modal.show {
            display: flex;
        }

        .video-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        .video-close-btn {
            margin-top: 15px;
            background: #333;
            border: none;
            color: var(--text-main);
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: var(--font-mono);
            cursor: pointer;
        }

        /* ── Quick Tour ── */
        #tourOverlay {
            display: none; /* Container has no position/z-index to avoid stacking context traps */
        }

        #tourBackdrop {
            position: fixed;
            inset: 0;
            background: rgba(7, 4, 10, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 150;
            pointer-events: all;
        }

        #tourSpotlight {
            position: fixed;
            border-radius: 20px;
            box-shadow:
                0 0 0 3px var(--primary),
                0 0 0 6px rgba(200,150,12,0.3),
                0 0 30px 8px var(--primary-glow);
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            animation: spotlightPulse 1.8s ease-in-out infinite;
            z-index: 155;
        }

        @keyframes spotlightPulse {
            0%, 100% { box-shadow: 0 0 0 3px var(--primary), 0 0 0 6px rgba(200,150,12,0.3), 0 0 30px 8px var(--primary-glow); }
            50%       { box-shadow: 0 0 0 3px var(--primary), 0 0 0 10px rgba(200,150,12,0.5), 0 0 50px 15px var(--primary-glow); }
        }

        #tourTooltip {
            position: fixed;
            background: linear-gradient(135deg, var(--bg-panel), var(--bg-lift));
            border: 2px solid var(--copper);
            border-radius: 18px;
            padding: 18px 22px;
            max-width: 290px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px var(--copper-glow);
            font-family: var(--font-body);
            transition: all 0.35s ease;
            pointer-events: all;
            z-index: 170;
        }

        .tour-highlighted {
            position: relative !important;
            z-index: 160 !important;
        }

        .tour-step-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .tour-title {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tour-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .tour-anim {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 10px;
            animation: tourBounce 0.8s infinite alternate;
        }

        @keyframes tourBounce {
            from { transform: translateY(0); }
            to   { transform: translateY(-6px); }
        }

        .tour-prev-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: bold;
            padding: 10px 8px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
            transition: all 0.2s;
            display: none;
            white-space: nowrap;
        }
        .tour-prev-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .tour-prev-btn:active { transform: scale(0.95); }

        .tour-next-btn {
            background: linear-gradient(45deg, var(--copper), var(--primary));
            border: none;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: bold;
            padding: 10px 8px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
            box-shadow: 0 0 12px var(--primary-glow);
            transition: transform 0.1s;
            white-space: nowrap;
        }

        .tour-next-btn:active { transform: scale(0.95); }

        #tourCountdown {
            position: fixed;
            inset: 0;
            z-index: 160;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(7,4,10,0.7);
        }

        #countdownNum {
            font-family: var(--font-mono);
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 40px var(--primary-glow), 0 0 80px var(--primary-glow);
            animation: cdPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cdPop {
            from { transform: scale(2); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Tour Overlay -->
    <div id="tourOverlay">
        <div id="tourBackdrop"></div>
        <div id="tourSpotlight"></div>
        <div id="tourTooltip">
            <div style="font-size: 0.8rem; font-weight: bold; color: var(--secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;">📖 HƯỚNG DẪN CHƠI</div>
            <div class="tour-step-label" id="tourLabel"></div>
            <div class="tour-anim" id="tourAnim"></div>
            <div class="tour-title" id="tourTitle"></div>
            <div class="tour-desc" id="tourDesc"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="tour-prev-btn" id="tourPrevBtn" onclick="tourPrev()" style="display: none;">← Quay lại</button>
                <button class="tour-next-btn" id="tourNextBtn" onclick="tourNext()">Tiếp theo →</button>
            </div>
        </div>
        <button onclick="skipTour()" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(7,4,10,0.7); border: 1px solid rgba(192,51,46,0.5); color: var(--secondary); font-family: var(--font-mono); font-size: 0.9rem; font-weight: bold; padding: 8px 24px; border-radius: 20px; cursor: pointer; pointer-events: all; transition: all 0.3s; z-index: 180; text-transform: uppercase; box-shadow: 0 0 10px var(--secondary-glow);">✕ Bỏ qua Hướng dẫn</button>
    </div>

    <!-- Countdown -->
    <div id="tourCountdown">
        <div id="countdownNum">3</div>
    </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">
        <!-- Content injected by JS -->
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="video-modal">
        <div class="video-container">
            <iframe id="ytIframe" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <button class="video-close-btn" onclick="closeVideo()">✕ ĐÓNG VIDEO</button>
    </div>

    <!-- Main Game -->
    <div class="header">
        <h1>Rèn Tuyệt Chiêu 2 — Phân Tích Cấu Tạo Số</h1>
        <div class="stats">
            <div class="score-text">ĐÚNG: <span id="scoreDisplay">0</span>/12</div>
            <div class="time-text">THỜI GIAN: <span id="timeDisplay">45</span>s</div>
        </div>
        <div class="progress-text">Câu: <span id="questionCountDisplay">1</span>/12</div>
    </div>
    
    <div class="game-area">
        <div class="number-display-container" id="numberDisplayContainer">
            <div class="main-number" id="mainNumberDisplay">000</div>
        </div>

        <div class="targets-container">
            <div class="target-box target-left" id="targetLeft">0</div>
            <div class="target-box target-right" id="targetRight">0</div>
        </div>

        <div class="deck-container" id="deckContainer">
            <!-- Cards rendered here by JS -->
        </div>

        <div id="feedback" class="feedback"></div>
        <div class="bottom-hint">Chạm để tráo bài - Vuốt để chọn hướng</div>
    </div>

    <script>
        // ─── QUICK TOUR SYSTEM ───────────────────────────────────────────
        const TOUR_STEPS = [
            {
                label: 'Bước 1 / 4',
                anim: '',
                title: 'Số 3 Chữ Số',
                desc: 'Mỗi lượt, 1 số có 3 chữ số sẽ hiện to ở đây. Nhiệm vụ của bạn là quan sát nhanh phân tích số đó!',
                target: 'numberDisplayContainer',
                tooltipPos: 'bottom',
            },
            {
                label: 'Bước 2 / 4',
                anim: '👈👉',
                title: 'Hai Mục Tiêu',
                desc: '2 chữ số được tách từ số đó và đặt sang 2 bên. Bạn phải xác định chúng thuộc Hàng nào.',
                target: 'targets-container',
                tooltipPos: 'bottom',
            },
            {
                label: 'Bước 3 / 4',
                anim: '👆',
                title: 'Chạm để Tráo Bài',
                desc: 'Chạm vào xếp bài để đổi thẻ Hàng lên trên: HÀNG TRĂM → HÀNG CHỤC → HÀNG ĐƠN VỊ.',
                target: 'deckContainer',
                tooltipPos: 'top',
            },
            {
                label: 'Bước 4 / 4',
                anim: '⬅️➡️',
                title: 'Vuốt để Trả Lời',
                desc: 'Khi thẻ Hàng đúng ở trên cùng, hãy VUỐT thẻ đó sang phía chứa chữ số tương ứng!',
                target: 'deckContainer',
                tooltipPos: 'top',
            },
        ];

        let tourStep = 0;
        let tourActive = true;

        function tourInit() {
            // Initially hide the tour overlay
            document.getElementById('tourOverlay').style.display = 'none';

            // Pre-populate number display for demo during the 5s overall look
            document.getElementById('mainNumberDisplay').innerText = '472';
            document.getElementById('targetLeft').innerText = '7';
            document.getElementById('targetRight').innerText = '4';
            renderDeck();

            // Dừng 5s cho xem tổng thể trước khi hiện hướng dẫn và đóng băng game
            setTimeout(() => {
                if (!tourActive) return; // If skipped already
                document.getElementById('tourOverlay').style.display = 'block';
                showTourStep(0);
            }, 5000);
        }

        let lastHighlightedEl = null;

        function highlightElement(el) {
            if (lastHighlightedEl) {
                lastHighlightedEl.classList.remove('tour-highlighted');
            }
            if (el) {
                el.classList.add('tour-highlighted');
                lastHighlightedEl = el;
            } else {
                lastHighlightedEl = null;
            }
        }

        function showTourStep(idx) {
            tourStep = idx;
            const step = TOUR_STEPS[idx];
            document.getElementById('tourLabel').textContent = step.label;
            
            const animEl = document.getElementById('tourAnim');
            if (step.anim) {
                animEl.textContent = step.anim;
                animEl.style.display = 'block';
            } else {
                animEl.style.display = 'none';
            }

            document.getElementById('tourTitle').textContent = step.title;
            document.getElementById('tourDesc').textContent  = step.desc;

            // Toggle Back/Quay lại button (only show from step 2 / index 1)
            const prevBtn = document.getElementById('tourPrevBtn');
            if (prevBtn) {
                if (idx > 0) {
                    prevBtn.style.display = 'block';
                } else {
                    prevBtn.style.display = 'none';
                }
            }

            const isLast = idx === TOUR_STEPS.length - 1;
            document.getElementById('tourNextBtn').textContent = isLast ? '🚀 BẮT ĐẦU CHƠI' : 'Tiếp theo →';

            // Spotlight target
            let targetEl;
            if (step.target === 'targets-container') {
                targetEl = document.querySelector('.targets-container');
            } else {
                targetEl = document.getElementById(step.target);
            }

            highlightElement(targetEl);

            if (targetEl) {
                const r = targetEl.getBoundingClientRect();
                const pad = 14;
                const sl = document.getElementById('tourSpotlight');
                sl.style.left   = (r.left - pad) + 'px';
                sl.style.top    = (r.top  - pad) + 'px';
                sl.style.width  = (r.width  + pad * 2) + 'px';
                sl.style.height = (r.height + pad * 2) + 'px';
                sl.style.opacity = '1';

                // Position tooltip – auto-flip if not enough space below
                const tt = document.getElementById('tourTooltip');
                const margin = 16;
                const ttH = 280; // estimated tooltip height with back button
                const ttW = 290;
                const centerX = Math.max(margin, Math.min(window.innerWidth - ttW - margin, r.left + r.width / 2 - ttW / 2));

                // Try preferred side, fall back if off-screen
                let topPos;
                if (step.tooltipPos === 'bottom') {
                    const belowTop = r.bottom + pad + margin;
                    if (belowTop + ttH < window.innerHeight - margin) {
                        topPos = belowTop;
                    } else {
                        // Not enough space below → put above
                        topPos = Math.max(margin, r.top - pad - margin - ttH);
                    }
                } else {
                    const aboveTop = r.top - pad - margin - ttH;
                    if (aboveTop > margin) {
                        topPos = aboveTop;
                    } else {
                        // Not enough space above → put below
                        topPos = r.bottom + pad + margin;
                    }
                }
                // Final clamp so it never escapes viewport
                topPos = Math.max(margin, Math.min(window.innerHeight - ttH - margin, topPos));

                tt.style.top  = topPos + 'px';
                tt.style.left = centerX + 'px';
                tt.style.width = ttW + 'px';

            }
        }

        function tourNext() {
            tourStep++;
            if (tourStep >= TOUR_STEPS.length) {
                // Hide tour, start countdown
                document.getElementById('tourOverlay').style.display = 'none';
                highlightElement(null);
                tourActive = false;
                startCountdown();
            } else {
                showTourStep(tourStep);
            }
        }

        function tourPrev() {
            if (tourStep > 0) {
                tourStep--;
                showTourStep(tourStep);
            }
        }

        function skipTour() {
            document.getElementById('tourOverlay').style.display = 'none';
            highlightElement(null);
            tourActive = false;
            startCountdown();
        }

        function startCountdown() {
            const cdEl = document.getElementById('tourCountdown');
            const numEl = document.getElementById('countdownNum');
            cdEl.style.display = 'flex';

            let n = 3;
            numEl.textContent = n;
            numEl.style.animation = 'none';
            void numEl.offsetWidth;
            numEl.style.animation = 'cdPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

            const iv = setInterval(() => {
                n--;
                if (n <= 0) {
                    clearInterval(iv);
                    cdEl.style.display = 'none';
                    startGame();
                } else {
                    numEl.textContent = n;
                    numEl.style.animation = 'none';
                    void numEl.offsetWidth;
                    numEl.style.animation = 'cdPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                }
            }, 900);
        }

        // ─────────────────────────────────────────────────────────────────

        // Game variables
        const urlParams = new URLSearchParams(window.location.search);
        const buoi = urlParams.get('buoi') || '1';

        const TOTAL_QUESTIONS = 12;
        let score = 0;
        let questionCount = 1;
        let timeLeft = 45;
        let gameInterval;
        
        let targetNumberStr = "";
        let leftDigitInfo = {};
        let rightDigitInfo = {};
        
        // Checkpoints state
        let minigame2Checkpoints = [];
        let roundStartTime = 0;
        
        // Deck state
        let deck = [
            { type: 'tram', label: 'HÀNG<br>TRĂM' },
            { type: 'chuc', label: 'HÀNG<br>CHỤC' },
            { type: 'donvi', label: 'HÀNG<br>ĐƠN VỊ' }
        ];

        // Interaction state
        let startX, startY;
        let isDragging = false;
        let hasMoved = false;
        let topCardEl = null;

        const deckContainer = document.getElementById('deckContainer');
        const feedbackEl = document.getElementById('feedback');

        function startGame() {
            // Hide any overlays from tour or game-over
            document.getElementById('tourOverlay').style.display = 'none';
            document.getElementById('tourCountdown').style.display = 'none';
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('win-bg', 'lose-bg');
            
            score = 0;
            questionCount = 1;
            timeLeft = 45;
            
            // Clear checkpoints
            minigame2Checkpoints = [];
            
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('timeDisplay').innerText = timeLeft;
            document.getElementById('questionCountDisplay').innerText = questionCount;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timeDisplay').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame(true);
                }
            }, 1000);
            
            nextRound();
        }

        function nextRound() {
            let h, t, u;
            
            if (questionCount === 7) {
                // Lượt đặc biệt 1: a _ b (Ví dụ: a5b)
                h = 'a';
                t = Math.floor(Math.random() * 10).toString();
                u = 'b';
            } else if (questionCount === 11) {
                // Lượt đặc biệt 2: _ a b (Ví dụ: 8ab)
                h = (Math.floor(Math.random() * 9) + 1).toString();
                t = 'a';
                u = 'b';
            } else {
                // Số bình thường
                let digits = [];
                while(digits.length < 3) {
                    let r = Math.floor(Math.random() * 10);
                    if (digits.length === 0 && r === 0) continue; 
                    if (!digits.includes(r)) digits.push(r);
                }
                h = digits[0].toString();
                t = digits[1].toString();
                u = digits[2].toString();
            }
            
            targetNumberStr = h + t + u;
            document.getElementById('mainNumberDisplay').innerText = targetNumberStr;
            
            // The mapping
            let mapping = [
                { val: h, type: 'tram' },
                { val: t, type: 'chuc' },
                { val: u, type: 'donvi' }
            ];
            
            if (questionCount === 7 || questionCount === 11) {
                // Ở lượt đặc biệt, luôn chọn 'a' và 'b' làm mục tiêu để test
                mapping = mapping.filter(m => m.val === 'a' || m.val === 'b');
            } else {
                // Lượt bình thường, chọn ngẫu nhiên 2 chữ số
                mapping.sort(() => Math.random() - 0.5);
                mapping = mapping.slice(0, 2);
            }
            
            // Tráo ngẫu nhiên để chia ra 2 bên Trái/Phải
            mapping.sort(() => Math.random() - 0.5);
            
            leftDigitInfo = mapping[0];
            rightDigitInfo = mapping[1];
            
            document.getElementById('targetLeft').innerText = leftDigitInfo.val;
            document.getElementById('targetRight').innerText = rightDigitInfo.val;
            
            // Record round start time
            roundStartTime = Date.now();
            
            // Randomize deck initial state visually? No, just keep current deck order or shuffle
            deck.sort(() => Math.random() - 0.5);
            renderDeck();
        }

        function renderDeck() {
            deckContainer.innerHTML = '';
            
            // Render from bottom to top so top is last in DOM but receives highest z-index via CSS
            for (let i = 2; i >= 0; i--) {
                const cData = deck[i];
                const card = document.createElement('div');
                card.className = `card type-${cData.type}`;
                card.innerHTML = cData.label;
                card.dataset.index = i; // 0 is top, 1 is middle, 2 is bottom
                card.id = `card-${i}`;
                deckContainer.appendChild(card);
            }
            
            topCardEl = document.getElementById('card-0');
            setupInteraction(topCardEl);
        }

        function cycleDeck() {
            // Top card moves out visually
            topCardEl.classList.add('swipe-out');
            
            setTimeout(() => {
                // Logic shift
                let top = deck.shift();
                deck.push(top);
                renderDeck();
            }, 150); // fast transition
        }

        function setupInteraction(card) {
            // Remove old listeners to prevent duplicates if called multiple times
            card.removeEventListener('mousedown', dragStart);
            card.removeEventListener('touchstart', dragStart);
            
            card.addEventListener('mousedown', dragStart);
            card.addEventListener('touchstart', dragStart, {passive: false});
        }

        function removeInteraction() {
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
            document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('touchend', dragEnd);
        }

        function dragStart(e) {
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
                e.preventDefault();
            }
            isDragging = true;
            hasMoved = false;
            
            // Add listeners dynamically on drag start
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) {
            if (!isDragging) return;
            let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            let deltaX = currentX - startX;
            let deltaY = currentY - startY;
            
            if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                hasMoved = true;
                if (e.type === 'touchmove') e.preventDefault(); // prevent scrolling
            }
            
            if (hasMoved && topCardEl) {
                topCardEl.style.transition = 'none';
                topCardEl.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${deltaX * 0.05}deg)`;
            }
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            removeInteraction();
            
            if (!hasMoved) {
                // It was a tap!
                cycleDeck();
                return;
            }
            
            let currentX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
            let deltaX = currentX - startX;
            
            if (Math.abs(deltaX) > 80) {
                // Swiped!
                if (deltaX > 0) {
                    processSwipe('right');
                } else {
                    processSwipe('left');
                }
            } else {
                // Snap back
                if (topCardEl) {
                    topCardEl.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    topCardEl.style.transform = '';
                }
            }
        }

        function processSwipe(direction) {
            let currentTopType = deck[0].type;
            let isCorrect = false;
            
            if (direction === 'left' && currentTopType === leftDigitInfo.type) {
                isCorrect = true;
            } else if (direction === 'right' && currentTopType === rightDigitInfo.type) {
                isCorrect = true;
            }
            
            // Animation
            if (direction === 'left') topCardEl.classList.add('swipe-left');
            else topCardEl.classList.add('swipe-right');
            
            // Feedback
            feedbackEl.classList.remove('show');
            void feedbackEl.offsetWidth; // trigger reflow
            
            if (isCorrect) {
                score++;
                feedbackEl.innerText = "CHÍNH XÁC!";
                feedbackEl.style.color = "var(--success)";
                feedbackEl.style.textShadow = "0 0 20px rgba(78,255,159,0.8)";
            } else {
                feedbackEl.innerText = "SAI RỒI!";
                feedbackEl.style.color = "var(--danger)";
                feedbackEl.style.textShadow = "0 0 20px var(--secondary-glow)";
            }
            
            // Save checkpoints
            let timeSpent = Math.max(1, Math.round((Date.now() - roundStartTime) / 1000));
            minigame2Checkpoints.push({
                question_id: 2000 + questionCount,
                attempt_number: 1,
                submitted_answer: `${currentTopType}_${direction}`,
                is_correct: isCorrect,
                time_spent_seconds: timeSpent
            });
            
            feedbackEl.classList.add('show');
            document.getElementById('scoreDisplay').innerText = score;
            
            setTimeout(() => {
                if (questionCount >= TOTAL_QUESTIONS) {
                    endGame(false);
                } else {
                    questionCount++;
                    document.getElementById('questionCountDisplay').innerText = questionCount;
                    nextRound();
                }
            }, 400);
        }

        function openVideo() {
            // Thay ID video và start time ở đây
            let videoId = "tQPklWVzur8";
            let startTime = "134"; // 2:14
            document.getElementById('ytIframe').src = `https://www.youtube.com/embed/${videoId}?start=${startTime}&autoplay=1`;
            document.getElementById('videoModal').classList.add('show');
        }

        function closeVideo() {
            document.getElementById('ytIframe').src = "";
            document.getElementById('videoModal').classList.remove('show');
        }

        function returnToMap() {
            window.parent.postMessage('minigame_won', '*');
        }

        function endGame(timeOut = false) {
            clearInterval(gameInterval);
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            // Save checkpoints to localStorage
            localStorage.setItem('cbToan_minigame2_checkpoints_bai' + buoi, JSON.stringify(minigame2Checkpoints));
            
            const isWin = score >= 11;
            const goScreen = document.getElementById('gameOverScreen');
            
            if (isWin) {
                goScreen.classList.add('win-bg');
                
                // Save progress
                localStorage.setItem('cbToan_skill_bai' + buoi, 'true');
                
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                });
                
                goScreen.innerHTML = `
                    <h1 style="color: var(--success); font-size: 3rem; text-align: center; font-family: var(--font-title); text-shadow: 0 0 20px rgba(78,255,159,0.5);">THÀNH CÔNG!</h1>
                    <h2 style="font-size: 1.2rem; text-align: center; color: #fff; font-weight: 400; margin-top: 10px;">Tuyệt chiêu 2 đã rèn xong! Gióng sắp có đủ giáp ra trận!</h2>
                    <div style="background: rgba(200,150,12,0.1); border: 1px solid var(--primary); border-radius: 10px; padding: 15px; margin: 15px; font-size: 1rem; line-height: 1.5; color: var(--primary); backdrop-filter: blur(5px);">
                        <strong>👨‍🏫 Thầy Long khen ngợi:</strong><br>"Giỏi lắm! Nắm vững Hàng Trăm, Hàng Chục, Hàng Đơn vị là chìa khóa giải mã phép thuật của Quỷ Số!"
                    </div>
                    <button class="start-btn" onclick="returnToMap()">QUAY LẠI ẢI</button>
                `;
            } else {
                goScreen.classList.add('lose-bg');
                goScreen.innerHTML = `
                    <h1 style="color: var(--danger); font-size: 3.5rem; font-family: var(--font-title); text-shadow: 0 0 20px rgba(255,0,85,0.5);">THẤT BẠI</h1>
                    <h2 style="font-size: 1.2rem; text-align: center; color: #fff; font-weight: 400; line-height: 1.6; margin-top: 10px;">Tuyệt chiêu 2 chưa rèn xong! Gióng vẫn chưa có đủ giáp!<br>Bạn chỉ đúng ${score}/12 câu${timeOut ? ' (Hết giờ)' : ''}. Cần 11/12 để qua.</h2>
                    <button class="start-btn" onclick="startGame()">THỬ LẠI</button>
                    <button class="yt-btn" onclick="openVideo()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21.582 6.186a2.506 2.506 0 0 0-1.762-1.766C18.265 4 12 4 12 4s-6.264 0-7.82.42a2.506 2.506 0 0 0-1.76 1.766C2 7.74 2 12 2 12s0 4.26.42 5.814a2.506 2.506 0 0 0 1.76 1.766C5.736 20 12 20 12 20s6.265 0 7.82-.42a2.506 2.506 0 0 0 1.762-1.766C22 16.26 22 12 22 12s0-4.26-.418-5.814zM9.99 15.47V8.529L16 12l-6.01 3.47z"/>
                        </svg>
                        XEM BÀI GIẢNG
                    </button>
                `;
            }
        }
    </script>

    <script>
        // Start the quick tour when page is ready
        window.addEventListener('load', () => {
            setTimeout(tourInit, 200); // slight delay so layout is settled
        });
    </script>
</body>
</html>
