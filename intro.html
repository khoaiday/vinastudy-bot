<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Chiến Binh Toán — Đại Việt</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:        #C8960C;
  --primary-glow:   rgba(200,150,12,0.40);
  --secondary:      #C0332E;
  --copper:         #B87333;
  --copper-glow:    rgba(184,115,51,0.30);
  --bg-void:        #07040A;
  --text-main:      #F5EED6;
  --text-muted:     #A08C70;
  --border:         rgba(184,115,51,0.40);
  --font-title:     'Philosopher', serif;
  --font-body:      'Lora', serif;
  --font-mono:      'Roboto Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg-void);
  color: var(--text-main);
  font-family: var(--font-body);
}

/* ══════════════════════════════════════
   SHARED BACKGROUND
══════════════════════════════════════ */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(7,4,10,0.45), rgba(7,4,10,0.50)),
    url('design-system/intro/intro-splash.jpg');
  background-size: cover;
  background-position: top center;
  opacity: 0;
  transition: opacity 1.2s ease;
}
#bg.loaded { opacity: 1; }

/* ══════════════════════════════════════
   PARTICLES
══════════════════════════════════════ */
#particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* ══════════════════════════════════════
   CURTAIN FADE
══════════════════════════════════════ */
#curtain {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg-void);
  opacity: 0; pointer-events: none;
  transition: opacity .55s ease;
}
#curtain.fade-in { opacity: 1; pointer-events: all; }

/* ══════════════════════════════════════
   BỎ QUA
══════════════════════════════════════ */
.btn-skip {
  position: fixed; bottom: 24px; right: 20px; z-index: 50;
  background: none; border: none;
  font-family: var(--font-body); font-size: .78rem; font-style: italic;
  color: var(--text-muted); cursor: pointer; padding: 6px 4px;
  text-shadow: 1px 1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1);
  opacity: 0; transition: opacity 1s ease 2s;
}
.btn-skip.show { opacity: 1; }
.btn-skip:active { color: var(--text-main); }

/* ══════════════════════════════════════
   SPLASH SCREEN
══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .5s ease;
}
#splash.hide { opacity: 0; pointer-events: none; }

/* Logo — trên */
.splash-top {
  text-align: center;
  opacity: 0; transform: translateY(-12px);
  transition: opacity 1s ease .8s, transform 1s ease .8s;
}
.splash-top.show { opacity: 1; transform: translateY(0); }

.game-logo {
  font-family: var(--font-title);
  font-size: 1.15rem; letter-spacing: 4px; text-transform: uppercase;
  color: var(--primary);
  text-shadow:
    1px  1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    1px -1px 0 rgba(7,4,10,1), -1px  1px 0 rgba(7,4,10,1),
    0 0 24px var(--primary-glow), 0 0 48px rgba(7,4,10,0.8);
}
.game-logo span { color: var(--secondary); }
.game-era {
  font-family: var(--font-mono); font-size: .62rem;
  color: var(--text-main); letter-spacing: 3px; margin-top: 5px;
  text-shadow: 1px 1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    0 0 12px rgba(7,4,10,0.95);
}

/* Tagline + nút — giữa */
.splash-center {
  margin-top: 40px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  padding: 0 36px; width: 100%;
  opacity: 0; transform: translateY(16px);
  transition: opacity 1s ease 1.4s, transform 1s ease 1.4s;
}
.splash-center.show { opacity: 1; transform: translateY(0); }

.splash-tagline {
  font-family: var(--font-body); font-size: 1.05rem; font-style: italic;
  color: #F5EED6; text-align: center; line-height: 2;
  text-shadow:
    1px  1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    1px -1px 0 rgba(7,4,10,1), -1px  1px 0 rgba(7,4,10,1),
    0 0 16px rgba(7,4,10,0.95), 0 0 32px rgba(7,4,10,0.8);
}
.splash-tagline strong { color: #fff; font-style: normal; }

.btn-prologue {
  background: none; border: none;
  font-family: var(--font-body); font-size: .92rem; font-style: italic;
  color: #E8D8B0; cursor: pointer; padding: 4px 0;
  text-decoration: underline;
  text-decoration-color: rgba(200,170,120,0.5);
  text-underline-offset: 4px;
  text-shadow: 1px 1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    0 0 12px rgba(7,4,10,0.95);
  animation: prologueBlink 1.3s ease-in-out infinite;
}
.btn-prologue:active { color: var(--primary); }
@keyframes prologueBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}

/* ══════════════════════════════════════
   PROLOGUE — TYPEWRITER SCENE
══════════════════════════════════════ */
#prologue-scene {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  padding: 0 28px;
  background: rgba(7,4,10,0.72);
  opacity: 0; pointer-events: none;
  transition: opacity .5s ease;
}
#prologue-scene.show { opacity: 1; pointer-events: all; }

.ps-header {
  padding: 28px 0 0; flex-shrink: 0; text-align: center;
}
.ps-logo {
  font-family: var(--font-title); font-size: 1rem; letter-spacing: 4px;
  color: var(--primary);
  text-shadow: 1px 1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    1px -1px 0 rgba(7,4,10,1), -1px 1px 0 rgba(7,4,10,1),
    0 0 20px var(--primary-glow);
}
.ps-logo span { color: var(--secondary); }

.seg-dots {
  display: flex; gap: 6px; justify-content: center; margin-top: 16px;
}
.seg-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border);
  transition: background .4s, transform .4s;
}
.seg-dot.active { background: var(--primary); transform: scale(1.3); }
.seg-dot.done   { background: var(--copper); }

.ps-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 32px 0; overflow: hidden;
}

.seg-text {
  font-family: var(--font-body); font-size: 1rem;
  line-height: 1.95; color: var(--text-main);
  text-align: left; width: 100%; max-width: 520px;
  transition: opacity .35s ease;
}
.seg-text.fade-out { opacity: 0; }

.cursor {
  display: inline-block; width: 2px; height: 1.1em;
  background: var(--primary); margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.next-wrap { display: block; text-align: center; margin-top: 18px; min-height: 1.6em; }

.btn-next {
  background: none; border: none;
  font-family: var(--font-body); font-size: .92rem; font-style: italic;
  color: var(--text-muted); cursor: pointer; padding: 4px 0;
  text-decoration: underline;
  text-decoration-color: rgba(160,140,112,0.45);
  text-underline-offset: 4px;
  text-shadow: 1px 1px 0 rgba(7,4,10,1), -1px -1px 0 rgba(7,4,10,1),
    0 0 10px rgba(7,4,10,0.9);
  opacity: 0; pointer-events: none;
  transition: color .2s;
}
.btn-next.show {
  pointer-events: all;
  animation: nextBlink 1.2s ease-in-out infinite;
}
.btn-next:active { color: var(--primary); }
@keyframes nextBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="particles"></canvas>
<div id="curtain"></div>
<button class="btn-skip" id="btnSkip" onclick="goRegister()"><em>Bỏ qua</em></button>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
  <div class="splash-top" id="splashTop">
    <div class="game-logo">Chiến Binh <span>Toán</span></div>
    <div class="game-logo" style="color:#fff;">VINASTUDY</div>
    <div class="game-era">HÀNH TRÌNH XUYÊN KHÔNG THỜI GIAN</div>
  </div>
  <div class="splash-center" id="splashCenter">
    <p class="splash-tagline">
      Năm 2026 SCN<br>
      <strong>Cỗ máy <span style="color:#B87333">Đông Sơn</span></strong> thức giấc
    </p>
    <button class="btn-prologue" onclick="startPrologue()">xem tiếp lời mở đầu &nbsp;»</button>
  </div>
</div>

<!-- ═══ PROLOGUE SCENE ═══ -->
<div id="prologue-scene">
  <div class="ps-header">
    <div class="ps-logo">Chiến Binh <span>Toán</span></div>
    <div class="seg-dots" id="segDots"></div>
  </div>
  <div class="ps-body">
    <div class="seg-text" id="segText">
      <span id="typed"></span><span class="cursor" id="cursor"></span>
      <div class="next-wrap">
        <button class="btn-next" id="btnNext" onclick="nextSegment()">xem tiếp &nbsp;»</button>
      </div>
    </div>
  </div>
</div>

<script>
if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

// ── Load background ───────────────────────────────────
window.addEventListener('load', () => {
  const bg  = document.getElementById('bg');
  const img = new Image();
  img.src   = 'design-system/intro/intro-splash.jpg';
  function reveal() {
    bg.classList.add('loaded');
    setTimeout(() => {
      document.getElementById('splashTop').classList.add('show');
      document.getElementById('splashCenter').classList.add('show');
      document.getElementById('btnSkip').classList.add('show');
    }, 200);
  }
  img.onload  = reveal;
  img.onerror = () => { bg.style.background = 'linear-gradient(160deg,#1a0c05,#07040A)'; reveal(); };
});

// ── Prologue segments ─────────────────────────────────
const SEGMENTS = [
  `Từ ngàn năm trước, các bậc tiền nhân Đại Việt đã tiên tri được một tai ương hủy diệt. Cỗ máy Đông Sơn không chỉ đơn thuần là vũ khí thủ thành, mà là một đại trận pháp công nghệ cổ xưa được phong ấn, lưu giữ toàn bộ mã nguồn của dòng chảy lịch sử dân tộc qua mọi thời đại...`,
  `Năm 2026 SCN, một dị tượng kinh hoàng ập đến. Một thực thể hắc ám vô hình từ phương Bắc bất ngờ trỗi dậy, khuấy đảo hư không. Thực thể đen tối này đang điên cuồng can thiệp vào trục thời gian, hòng xóa sổ những chiến công hiển hách và bóp méo cội nguồn dân tộc...`,
  `Trước nguy cơ lịch sử bị xóa sổ, Cỗ máy Đông Sơn chính thức thức giấc, tự động kích hoạt hệ thống phòng thủ xuyên thời không. Nó biến thành một cổng trục thời gian vĩ đại, phóng đi những hạt dữ liệu định vị vào không gian quá khứ, kêu gọi các "Chiến binh Toán" bước vào cuộc hành trình xuyên thời không...`,
];

let currentSeg = 0, typingTimer = null;

const COPPER_SPAN = '<span style="color:#B87333;text-shadow:0 0 8px rgba(184,115,51,0.6)">Đông Sơn</span>';

// Tách text thành mảng tokens: ký tự thường hoặc {copper: true}
function tokenize(text) {
  const tokens = [];
  const re = /Đông Sơn/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    for (const ch of text.slice(last, m.index)) tokens.push(ch);
    tokens.push({ copper: true });
    last = m.index + 'Đông Sơn'.length;
  }
  for (const ch of text.slice(last)) tokens.push(ch);
  return tokens;
}

// ── Dots ─────────────────────────────────────────────
function buildDots() {
  const c = document.getElementById('segDots');
  SEGMENTS.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'seg-dot' + (i === 0 ? ' active' : '');
    d.id = `dot-${i}`; c.appendChild(d);
  });
}
function updateDots(idx) {
  SEGMENTS.forEach((_, i) => {
    document.getElementById(`dot-${i}`).className =
      'seg-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
  });
}

// ── Typewriter ────────────────────────────────────────
function typeSegment(idx) {
  const tokens = tokenize(SEGMENTS[idx]);
  const typed  = document.getElementById('typed');
  const cursor = document.getElementById('cursor');
  const btn    = document.getElementById('btnNext');
  let html = '';
  typed.innerHTML = '';
  btn.className = 'btn-next';
  btn.textContent = idx === SEGMENTS.length - 1 ? 'bắt đầu »' : 'xem tiếp »';
  cursor.style.display = 'inline-block';
  let i = 0;
  function tick() {
    if (i < tokens.length) {
      const tok = tokens[i++];
      if (tok.copper) {
        html += COPPER_SPAN;          // insert màu đồng luôn, không qua trắng
        typed.innerHTML = html;
        typingTimer = setTimeout(tick, 32);
      } else {
        html += tok === '<' ? '&lt;' : tok === '>' ? '&gt;' : tok === '&' ? '&amp;' : tok;
        typed.innerHTML = html;
        typingTimer = setTimeout(tick, tok === '.' || tok === ',' ? 180 : tok === ' ' ? 28 : 32);
      }
    } else {
      cursor.style.display = 'none';
      btn.classList.add('show');
    }
  }
  tick();
}

// Click vùng text để skip typing
document.getElementById('segText').addEventListener('click', () => {
  if (typingTimer) {
    clearTimeout(typingTimer); typingTimer = null;
    // Build full HTML with copper color
    const html = tokenize(SEGMENTS[currentSeg])
      .map(t => t.copper ? COPPER_SPAN : (t === '<' ? '&lt;' : t === '>' ? '&gt;' : t === '&' ? '&amp;' : t))
      .join('');
    document.getElementById('typed').innerHTML = html;
    document.getElementById('cursor').style.display = 'none';
    document.getElementById('btnNext').classList.add('show');
  }
});

function nextSegment() {
  if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
  currentSeg++;
  if (currentSeg >= SEGMENTS.length) { goRegister(); return; }
  // Fade out text cũ → rồi gõ đoạn mới
  const segText = document.getElementById('segText');
  segText.classList.add('fade-out');
  setTimeout(() => {
    updateDots(currentSeg);
    typeSegment(currentSeg);
    segText.classList.remove('fade-out');
  }, 360);
}

// ── Start prologue — fade to dark → swap ─────────────
function startPrologue() {
  const curtain = document.getElementById('curtain');
  const scene   = document.getElementById('prologue-scene');
  curtain.classList.add('fade-in');
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    buildDots();
    // Hiện prologue NGAY (không transition) trong khi curtain vẫn đang che
    scene.style.transition = 'none';
    scene.classList.add('show');
    scene.getBoundingClientRect(); // force reflow
    typeSegment(0);
    // Fade curtain ra — prologue đã sẵn sàng → không chớp
    curtain.classList.remove('fade-in');
    // Khôi phục transition cho sau
    setTimeout(() => { scene.style.transition = ''; }, 600);
  }, 520);
}

// ── Navigate ──────────────────────────────────────────
function goRegister() {
  const curtain = document.getElementById('curtain');
  curtain.classList.add('fade-in');
  const tgId = new URLSearchParams(window.location.search).get('tg_id');
  const dest  = tgId ? `/register?tg_id=${tgId}` : '/register';
  setTimeout(() => { window.location.href = dest; }, 580);
}

// ── Particles ─────────────────────────────────────────
(function () {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  const COLORS = ['rgba(200,150,12,', 'rgba(184,115,51,', 'rgba(192,51,46,'];
  let W, H, dots = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function spawn() {
    return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+.3,
             a: Math.random()*.45+.1, vx:(Math.random()-.5)*.22, vy:-(Math.random()*.4+.08),
             c: COLORS[Math.floor(Math.random()*COLORS.length)] };
  }
  function init() { resize(); dots = Array.from({length:55}, spawn); }
  function tick() {
    ctx.clearRect(0,0,W,H);
    dots.forEach(d => {
      d.x+=d.vx; d.y+=d.vy;
      if(d.y<-4) Object.assign(d, spawn(), {y:H+4});
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=d.c+d.a+')'; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', resize);
  init(); tick();
})();
</script>
</body>
</html>
