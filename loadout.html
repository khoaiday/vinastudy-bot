<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Loadout</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:   #C8960C;
  --gold2:  #F5C842;
  --red:    #C0332E;
  --bg:     #0A0608;
  --panel:  #181018;
  --row:    #1E1428;
  --row2:   #160F20;
  --border: #3A2A48;
  --metal:  #2A1E38;
  --text:   #F5EED6;
  --sub:    #C4B090;
  --locked: #3A2A48;
  --lt:     #5A4A60;
  --success:#5ABCAA;
  --ft: 'Philosopher', serif;
  --fm: 'Roboto Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fm);}

#app{
  width:100vw;height:100vh;height:100dvh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  background: linear-gradient(180deg,#130A1A 0%,#0A0608 100%);
}

/* ── TOP BAR ── */
#topBar{
  flex-shrink:0;
  background:linear-gradient(180deg,#2A1535 0%,#1A0D28 50%,#120A1C 100%);
  border-bottom:2px solid var(--border);
  padding:7px 10px 6px;
  display:flex;align-items:center;gap:8px;
}
.screen-title-badge{
  flex-shrink:0;
  background:linear-gradient(135deg,#3A2040 0%,#28163A 100%);
  border:2px solid var(--gold);
  border-radius:6px;padding:4px 12px;
  font-family:var(--ft);font-size:15px;font-weight:700;
  color:var(--gold2);letter-spacing:1px;
  box-shadow:0 0 8px rgba(200,150,12,0.3),inset 0 1px 0 rgba(255,255,255,0.05);
  text-shadow:0 0 10px rgba(200,150,12,0.5);
}
.top-mission{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;gap:1px;
}
.top-ai{font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;}
.top-boss{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--text);font-family:var(--ft);
}
.top-coins{
  flex-shrink:0;
  background:linear-gradient(135deg,#2A1A00,#1A1000);
  border:1px solid var(--gold);border-radius:5px;
  padding:3px 8px;font-size:12px;color:var(--gold2);
  display:flex;align-items:center;gap:4px;
  box-shadow:0 0 6px rgba(200,150,12,0.2);
}
.top-coins.hidden{display:none;}

/* ── SLIDES ── */
#slides{flex:1;overflow:hidden;position:relative;}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
}
#s1{transform:translateX(0);}
#s2{transform:translateX(100%);}
#slides.s2 #s1{transform:translateX(-100%);}
#slides.s2 #s2{transform:translateX(0);}

/* ── LIST AREA ── */
.list-area{
  flex:1;overflow-y:auto;
  padding:6px 0;
}
.list-area::-webkit-scrollbar{display:none;}

/* Tower / Item Row */
.list-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  border-bottom:1px solid rgba(58,42,72,0.5);
  cursor:pointer;user-select:none;
  transition:background .12s;
  position:relative;
  min-height:64px;
}
.list-row:active{background:rgba(200,150,12,0.06);}
.list-row.selected{
  background:linear-gradient(90deg,rgba(200,150,12,0.12) 0%,rgba(200,150,12,0.04) 100%);
  border-left:3px solid var(--gold);
}
.list-row.selected-default{
  background:linear-gradient(90deg,rgba(90,188,170,0.1) 0%,rgba(90,188,170,0.03) 100%);
  border-left:3px solid var(--success);
}
.list-row.locked{
  opacity:0.5;cursor:not-allowed;
  background:rgba(20,12,28,0.5);
}
.list-row.giunuoc-locked{
  opacity:0.4;cursor:not-allowed;
}

/* Icon circle */
.row-icon{
  flex-shrink:0;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#2E1E42,#1C1228);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.list-row.selected .row-icon{
  border-color:var(--gold);
  box-shadow:0 0 10px var(--gold),0 0 20px rgba(200,150,12,0.2);
}
.list-row.selected-default .row-icon{
  border-color:var(--success);
  box-shadow:0 0 10px var(--success),0 0 20px rgba(90,188,170,0.2);
}
.icon-cost{
  position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  background:#1A0D00;border:1px solid var(--gold);
  border-radius:8px;padding:0 5px;
  font-size:9px;color:var(--gold2);font-weight:700;
  white-space:nowrap;
}
.icon-cost.free{border-color:var(--success);color:var(--success);}
.icon-lock{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(10,6,14,0.6);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}

/* Row info */
.row-info{flex:1;overflow:hidden;}
.row-name{
  font-family:var(--ft);font-size:16px;font-weight:700;
  color:var(--gold2);letter-spacing:0.5px;
  margin-bottom:2px;
}
.list-row.selected-default .row-name{color:var(--success);}
.list-row.locked .row-name,.list-row.giunuoc-locked .row-name{color:var(--lt);}
.row-desc{font-size:12px;color:var(--sub);line-height:1.4;}
.list-row.locked .row-desc,.list-row.giunuoc-locked .row-desc{color:var(--locked);}
.row-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tag{
  font-size:9px;padding:1px 5px;border-radius:3px;
  background:rgba(58,42,72,0.6);color:var(--sub);border:1px solid rgba(58,42,72,0.8);
}

/* Row price (right) */
.row-price{
  flex-shrink:0;text-align:right;
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
}
.price-badge{
  background:linear-gradient(135deg,#2A1A00,#1A1000);
  border:1px solid var(--gold);border-radius:6px;
  padding:4px 8px;font-size:12px;font-weight:700;
  color:var(--gold2);white-space:nowrap;
  box-shadow:0 0 6px rgba(200,150,12,0.2);
  display:flex;align-items:center;gap:3px;
}
.price-badge.selected-badge{
  background:linear-gradient(135deg,#0A1A0E,#051008);
  border-color:var(--success);color:var(--success);
  box-shadow:0 0 6px rgba(90,188,170,0.2);
}
.price-badge.cant-badge{
  background:rgba(20,12,28,0.6);border-color:var(--locked);
  color:var(--lt);box-shadow:none;
}
.check-mark{font-size:16px;color:var(--gold);}
.list-row.selected-default .check-mark{color:var(--success);}

/* Giữ Nước banner */
.gn-banner{
  margin:10px;border-radius:10px;
  background:rgba(192,51,46,0.1);border:1px solid rgba(192,51,46,0.3);
  padding:14px;text-align:center;
}
.gn-banner-title{font-family:var(--ft);font-size:15px;color:var(--red);margin-bottom:6px;}
.gn-banner-desc{font-size:11px;color:var(--sub);line-height:1.7;}

/* Unlock hint */
.unlock-hint{
  margin:6px 10px 0;padding:9px 12px;
  background:rgba(192,51,46,0.07);border:1px solid rgba(192,51,46,0.2);
  border-radius:8px;font-size:11px;color:var(--sub);line-height:1.7;
  text-align:center;
}
.unlock-hint strong{color:var(--gold2);}

/* ── BOTTOM BAR ── */
#bottomBar{
  flex-shrink:0;z-index:10;
  background:linear-gradient(0deg,#1A0D28 0%,#120A1C 100%);
  border-top:2px solid var(--border);
  padding:10px 10px;
  display:flex;align-items:center;gap:8px;
}
.bb-btn{
  flex-shrink:0;
  background:linear-gradient(135deg,#2A1A38,#1C1228);
  border:2px solid var(--border);color:var(--sub);
  font-family:var(--ft);font-size:14px;font-weight:700;
  padding:10px 14px;border-radius:8px;cursor:pointer;
  letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
  transition:all .12s;
}
.bb-btn:active{transform:scale(0.96);}

/* Slot circles */
.bb-slots{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
}
.bb-slot{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#2A1E38,#1A1228);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  transition:all .15s;
}
.bb-slot.active{
  border-color:var(--gold);
  box-shadow:0 0 8px rgba(200,150,12,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
  background:linear-gradient(135deg,#2A1A00,#1A1000);
}
.bb-slot.active-default{
  border-color:var(--success);
  box-shadow:0 0 8px rgba(90,188,170,0.4);
  background:linear-gradient(135deg,#0A1E18,#061210);
}
.bb-slot-price{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  background:#0A0608;border:1px solid var(--gold);
  border-radius:6px;padding:0 4px;
  font-size:8px;color:var(--gold2);font-weight:700;white-space:nowrap;
}
.bb-slot-price.free-p{border-color:var(--success);color:var(--success);}

.bb-next{
  flex-shrink:0;
  background:linear-gradient(135deg,#7A1A08,#A02010,#C0332E);
  border:2px solid #E05040;color:var(--text);
  font-family:var(--ft);font-size:15px;font-weight:700;
  padding:10px 16px;border-radius:8px;cursor:pointer;
  letter-spacing:0.5px;
  box-shadow:0 0 12px rgba(192,51,46,0.4),0 3px 0 #6A0E04,inset 0 1px 0 rgba(255,255,255,0.1);
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
  transition:all .12s;
}
.bb-start{
  flex-shrink:0;
  background:linear-gradient(135deg,#5C3800,#8A5A00,#C8960C);
  border:2px solid #E0B030;color:#07040A;
  font-family:var(--ft);font-size:15px;font-weight:700;
  padding:10px 16px;border-radius:8px;cursor:pointer;
  letter-spacing:0.5px;
  box-shadow:0 0 14px rgba(200,150,12,0.5),0 3px 0 #3A2400,inset 0 1px 0 rgba(255,255,255,0.15);
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  transition:all .12s;
}
.bb-next:active,.bb-start:active{transform:scale(0.97);box-shadow:none;}

/* Toast */
#toast{
  position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(18,10,26,0.96);border:1px solid var(--gold);
  border-radius:16px;padding:6px 14px;font-size:12px;
  color:var(--text);opacity:0;transition:all .22s;z-index:999;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topBar">
    <div class="screen-title-badge" id="screenTitle">THÁP</div>
    <div class="top-mission">
      <div class="top-ai" id="topAi">ẢI 7 · CỔ LOA</div>
      <div class="top-boss"><span id="topBossEmoji">🐓</span> <span id="topBossName">Bạch Kê Tinh</span></div>
    </div>
    <div class="top-coins" id="topCoins">💰 <span id="coinsVal">0</span></div>
  </div>

  <!-- SLIDES -->
  <div id="slides">

    <!-- SCREEN 1: TOWERS -->
    <div class="slide" id="s1">
      <div class="list-area" id="towerList"></div>
    </div>

    <!-- SCREEN 2: ITEMS -->
    <div class="slide" id="s2">
      <div class="list-area" id="itemList"></div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div id="bottomBar">
    <button class="bb-btn" id="btnBack" onclick="handleBack()">BACK</button>
    <div class="bb-slots" id="bbSlots"></div>
    <button class="bb-next" id="btnNext" onclick="handleNext()">NEXT</button>
  </div>

</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════
// DATA
// ══════════════════════════════════

const AI_DATA = {
  7:{ zone:'ẢI 7 · CỔ LOA', bossEmoji:'🐓', bossName:'Bạch Kê Tinh' },
  8:{ zone:'ẢI 8 · CỔ LOA', bossEmoji:'👤', bossName:'Ám Toán Sứ'  },
};

const TOWERS = [
  { id:'no_lien_chau', name:'NỎ LIÊN CHÂU', emoji:'🏹', price:0,   isDefault:true,
    desc:'Bắn liên thanh, 1 mục tiêu. Tầm 2.5 ô. Tốc độ 0.5s/phát.',
    tags:['Nhanh','Single-target'] },
  { id:'bay_nhua',     name:'BẪY NHỰA',     emoji:'💧', price:0,   isDefault:true,
    desc:'Làm chậm địch 40%. Diện tích nhỏ. Không gây sát thương.',
    tags:['Làm chậm','Support'] },
  { id:'bay_chong',    name:'BẪY CHÔNG',    emoji:'🪤', price:90,  isDefault:false,
    desc:'1500 sát thương khi địch dẫm lên. Kích hoạt 1 lần.',
    tags:['Bẫy','Burst'] },
  { id:'than_co_phao', name:'THẦN CƠ PÁO',  emoji:'💣', price:150, isDefault:false,
    desc:'Pháo nổ diện, sát thương vùng bán kính 1.8 ô. Tầm 3.5 ô.',
    tags:['AoE','Chậm'] },
  { id:'trong_lenh',   name:'TRỐNG LỆNH',   emoji:'🥁', price:250, isDefault:false,
    desc:'Tăng sức mạnh tháp lân cận +25%. Không tấn công trực tiếp.',
    tags:['Buff','Support'] },
  { id:'hoa_thap',     name:'HỎA THÁP',     emoji:'🔥', price:200, isDefault:false,
    desc:'Đốt cháy liên tục, gây 300 sát thương/s. Hiệu quả vs đám đông.',
    tags:['DoT','AoE'] },
  { id:'loi_thap',     name:'LÔI THÁP',     emoji:'⚡', price:300, isDefault:false,
    desc:'Sét dây chuyền 3 mục tiêu, 700 sát thương. Hiệu quả nhất game.',
    tags:['Chain','Elite'] },
];

const ITEMS = [
  { id:'bom_than',  name:'BOM THẦN',   emoji:'💥', uses:1, tc:null, alwaysOpen:true,
    desc:'Tiêu diệt toàn bộ địch trong vùng 3×3 ô. Sử dụng khi bị áp đảo.' },
  { id:'dong_bang', name:'ĐÔNG BĂNG',  emoji:'❄️', uses:1, tc:'tc1', alwaysOpen:false,
    desc:'Đóng băng TẤT CẢ địch trên bản đồ trong 5 giây. Cực mạnh mid-game.' },
  { id:'vang_them', name:'VÀNG THÊM',  emoji:'💰', uses:1, tc:'tc2', alwaysOpen:false,
    desc:'+150 Vàng Đông Sơn tức thì. Cho phép mua thêm tháp trong trận.' },
];

// ══════════════════════════════════
// STATE
// ══════════════════════════════════

let aiNum=7, mode='dungnuoc', coins=0, quizPct=0;
let tc1=false, tc2=false;
let selectedTowers = new Set(['no_lien_chau','bay_nhua']);
let selectedItems  = new Set();
let spentCoins=0, screen=1;

// ══════════════════════════════════
// INIT
// ══════════════════════════════════

function init(){
  if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
  const p=new URLSearchParams(location.search);
  aiNum=parseInt(p.get('ai')||'7');
  if(![7,8].includes(aiNum))aiNum=7;

  mode    =localStorage.getItem(`vs_mode_ai${aiNum}`)||'dungnuoc';
  coins   =parseInt(localStorage.getItem(`vs_coins_ai${aiNum}`)||'0');
  quizPct =parseInt(localStorage.getItem(`vs_quiz_pct_ai${aiNum}`)||'0');
  tc1     =localStorage.getItem(`vs_tc1_ai${aiNum}`)==='true';
  tc2     =localStorage.getItem(`vs_tc2_ai${aiNum}`)==='true';
  if(quizPct>=80){tc1=true;tc2=true;}

  const d=AI_DATA[aiNum]||AI_DATA[7];
  document.getElementById('topAi').textContent       = d.zone;
  document.getElementById('topBossEmoji').textContent= d.bossEmoji;
  document.getElementById('topBossName').textContent = d.bossName;

  if(mode==='giunuoc') document.getElementById('topCoins').classList.add('hidden');

  renderTowers();
  renderItems();
  renderBottomSlots();
  updateCoins();
}

// ══════════════════════════════════
// TOWERS
// ══════════════════════════════════

function renderTowers(){
  const list=document.getElementById('towerList');
  list.innerHTML='';
  TOWERS.forEach(t=>{
    const isSel   = selectedTowers.has(t.id);
    const canBuy  = availableCoins()>=t.price||isSel;
    const isGN    = mode==='giunuoc'&&!t.isDefault;

    const row=document.createElement('div');
    let cls='list-row';
    if(isSel&&t.isDefault) cls+=' selected-default';
    else if(isSel)         cls+=' selected';
    else if(isGN)          cls+=' giunuoc-locked';
    else if(!t.isDefault&&!canBuy) cls+=' locked';
    row.className=cls;

    // Icon
    let iconExtra='';
    if(isGN||(!t.isDefault&&!canBuy&&!isSel))
      iconExtra='<div class="icon-lock">🔒</div>';
    const costLabel = t.isDefault
      ? `<div class="icon-cost free">Mặc định</div>`
      : isSel||canBuy
        ? `<div class="icon-cost">💰${t.price}</div>`
        : `<div class="icon-cost" style="border-color:var(--locked);color:var(--lt)">💰${t.price}</div>`;

    // Right side
    let rightHtml='';
    if(isSel){
      rightHtml=`<span class="check-mark">✓</span>`;
    } else if(t.isDefault){
      rightHtml=`<div class="price-badge selected-badge">✓ Có sẵn</div>`;
    } else if(isGN){
      rightHtml=`<div class="price-badge cant-badge">🔒</div>`;
    } else if(!canBuy){
      rightHtml=`<div class="price-badge cant-badge">💰 ${t.price}</div>`;
    } else {
      rightHtml=`<div class="price-badge">💰 ${t.price}</div>`;
    }

    row.innerHTML=`
      <div class="row-icon">
        <span>${t.emoji}</span>
        ${iconExtra}
        ${costLabel}
      </div>
      <div class="row-info">
        <div class="row-name">${t.name}</div>
        <div class="row-desc">${t.desc}</div>
        <div class="row-tags">${t.tags.map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      </div>
      <div class="row-price">${rightHtml}</div>
    `;

    if(!t.isDefault&&!isGN) row.addEventListener('click',()=>toggleTower(t));
    list.appendChild(row);
  });
}

function toggleTower(t){
  if(mode==='giunuoc') return;
  if(selectedTowers.has(t.id)){
    selectedTowers.delete(t.id);
    spentCoins-=t.price;
    showToast(`Bỏ ${t.name} · +${t.price} xu`);
  } else {
    if(selectedTowers.size>=6){showToast('⚠️ Tối đa 6 tháp!');return;}
    if(availableCoins()<t.price){showToast(`❌ Cần ${t.price} xu`);return;}
    selectedTowers.add(t.id);
    spentCoins+=t.price;
    showToast(`✓ ${t.name} · −${t.price} xu`);
  }
  updateCoins();renderTowers();renderBottomSlots();
}

// ══════════════════════════════════
// ITEMS
// ══════════════════════════════════

function renderItems(){
  const list=document.getElementById('itemList');
  list.innerHTML='';

  if(mode==='giunuoc'){
    list.innerHTML=`<div class="gn-banner">
      <div class="gn-banner-title">⚔️ Chế Độ Giữ Nước</div>
      <div class="gn-banner-desc">Không có tuyệt chiêu.<br>Dựa vào kỹ năng và tháp mặc định.<br><br>Chọn <strong style="color:var(--gold2)">Dựng Nước</strong> để mở khoá.</div>
    </div>`;
    return;
  }

  const lockedItems=[];
  ITEMS.forEach(itm=>{
    let unlocked=itm.alwaysOpen;
    if(itm.id==='dong_bang') unlocked=tc1;
    if(itm.id==='vang_them') unlocked=tc2;
    if(!unlocked) lockedItems.push(itm);

    const isSel=selectedItems.has(itm.id);
    const row=document.createElement('div');
    row.className='list-row'+(isSel?' selected':'')+(unlocked?'':' locked');

    let rightHtml=isSel
      ? `<span class="check-mark">✓</span>`
      : unlocked
        ? `<div class="price-badge">× ${itm.uses}</div>`
        : `<div class="price-badge cant-badge">🔒</div>`;

    row.innerHTML=`
      <div class="row-icon">
        <span>${itm.emoji}</span>
        ${!unlocked?'<div class="icon-lock">🔒</div>':''}
        <div class="icon-cost${unlocked?' free':''}" style="${unlocked?'':'border-color:var(--locked);color:var(--lt)'}">×${itm.uses}</div>
      </div>
      <div class="row-info">
        <div class="row-name" style="${!unlocked?'color:var(--lt)':''}">${itm.name}</div>
        <div class="row-desc">${itm.desc}</div>
      </div>
      <div class="row-price">${rightHtml}</div>
    `;
    if(unlocked) row.addEventListener('click',()=>toggleItem(itm));
    list.appendChild(row);
  });

  // Unlock hint
  if(lockedItems.length){
    const hints=[];
    if(!tc1) hints.push('Thắng <strong>Minigame TC1</strong>');
    if(!tc2) hints.push('Thắng <strong>Minigame TC2</strong>');
    if(quizPct<80) hints.push(`Quiz <strong>>80%</strong> (${quizPct}%)`);
    const h=document.createElement('div');
    h.className='unlock-hint';
    h.innerHTML='🔓 Mở khoá: '+hints.join(' hoặc ');
    list.appendChild(h);
  }
}

function toggleItem(itm){
  if(selectedItems.has(itm.id)) selectedItems.delete(itm.id);
  else selectedItems.add(itm.id);
  renderItems();renderBottomSlots();
}

// ══════════════════════════════════
// BOTTOM SLOTS
// ══════════════════════════════════

function renderBottomSlots(){
  const bar=document.getElementById('bbSlots');
  bar.innerHTML='';
  const maxSlots = screen===1 ? 6 : 3;
  const selArr   = screen===1 ? [...selectedTowers] : [...selectedItems];
  const allData  = screen===1 ? TOWERS : ITEMS;

  for(let i=0;i<maxSlots;i++){
    const tid=selArr[i];
    const slot=document.createElement('div');
    if(tid){
      const d=allData.find(x=>x.id===tid);
      const isDefault=d&&d.isDefault;
      slot.className='bb-slot '+(isDefault?'active-default':'active');
      slot.textContent=d?d.emoji:'?';
      const priceEl=document.createElement('div');
      priceEl.className='bb-slot-price'+(isDefault?' free-p':'');
      priceEl.textContent=isDefault?'✓':(d.price||d.uses?`×${d.uses||d.price}`:'×1');
      slot.appendChild(priceEl);
    } else {
      slot.className='bb-slot';
    }
    bar.appendChild(slot);
  }
}

// ══════════════════════════════════
// NAVIGATION
// ══════════════════════════════════

function handleBack(){
  if(screen===2){
    screen=1;
    document.getElementById('slides').classList.remove('s2');
    document.getElementById('screenTitle').textContent='THÁP';
    document.getElementById('btnBack').textContent='BACK';
    const nb=document.getElementById('btnNext');
    nb.className='bb-next'; nb.textContent='NEXT'; nb.onclick=handleNext;
    renderBottomSlots();
  } else {
    location.href=mode==='giunuoc'?`intro.html?ai=${aiNum}`:`battle.html?ai=${aiNum}`;
  }
}

function handleNext(){
  screen=2;
  document.getElementById('slides').classList.add('s2');
  document.getElementById('screenTitle').textContent='TUYỆT CHIÊU';
  document.getElementById('btnBack').textContent='BACK';
  const nb=document.getElementById('btnNext');
  nb.className='bb-start'; nb.textContent='START'; nb.onclick=startGame;
  renderBottomSlots();
}

function startGame(){
  localStorage.setItem('vs_loadout_towers',JSON.stringify([...selectedTowers]));
  localStorage.setItem('vs_loadout_items', JSON.stringify([...selectedItems]));
  localStorage.setItem('vs_loadout_ai',    String(aiNum));
  localStorage.setItem('vs_loadout_mode',  mode);
  localStorage.setItem(`vs_coins_ai${aiNum}`,String(availableCoins()));
  const nb=document.getElementById('btnNext');
  nb.textContent='...';nb.disabled=true;
  setTimeout(()=>{location.href=`tower_defense.html?ai=${aiNum}&mode=${mode}`;},350);
}

// ══════════════════════════════════
// HELPERS
// ══════════════════════════════════

function availableCoins(){return coins-spentCoins;}
function updateCoins(){
  document.getElementById('coinsVal').textContent=availableCoins();
}
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500);
}

init();
</script>
</body>
</html>
