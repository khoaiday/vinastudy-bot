<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hồ Sơ Chiến Binh</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:   #C8960C; /* Vàng nghệ */
  --secondary: #C0332E; /* Đỏ son */
  --success:   #22C55E; /* Ngải lục */
  --danger:    #EF4444; /* Đỏ hỏa */
  --gold:      #C8960C;
  --bg:        #080502; /* Mực tàu */
  --card:      #160E1C; /* Trầm gỗ */
  --border:    rgba(184,115,51,.3); /* Đồng Đông Sơn */
  --text:      #D4C4A0; /* Ngà voi */
  --glow:      0 0 18px rgba(200,150,12,.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', 'Segoe UI', system-ui, sans-serif;
}

/* Lưới đồng Đông Sơn cổ kính */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(184,115,51,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,115,51,.045) 1px, transparent 1px);
  background-size: 32px 32px;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding-bottom: 110px;
}

/* ── Loading ── */
#loadOverlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.spinner {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--primary); border-left-color: var(--secondary);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt {
  font-family: 'Philosopher', serif;
  font-size: 13px; letter-spacing: 3px;
  color: var(--primary); text-shadow: 0 0 10px var(--primary);
}

/* ── Header ── */
.hdr {
  padding: 18px 20px 14px;
  background: linear-gradient(180deg, rgba(200, 150, 12, 0.08) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.hdr-icon { font-size: 1.7rem; }
.hdr-info { flex: 1; }
.hdr-title {
  font-family: 'Philosopher', serif;
  font-size: 1.35rem; font-weight: 700;
  color: var(--primary); text-shadow: var(--glow);
  letter-spacing: 2px; text-transform: uppercase;
}
.hdr-sub { font-size: .68rem; color: rgba(212,196,160,.4); margin-top: 2px; letter-spacing: 1.5px; }
.btn-logout {
  padding: 8px 12px;
  border-radius: 8px; border: 1px solid rgba(192,51,46,.4);
  background: rgba(192,51,46,.08);
  color: var(--secondary); font-size: .78rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .18s;
}
.btn-logout:active { background: rgba(192,51,46,.2); }

/* ── Premium Card ── */
.cyber-card {
  position: relative; z-index: 1;
  border-radius: 16px;
  background: var(--card);
  padding: 20px;
  margin: 16px 16px 0;
  border: 1px solid var(--border);
}
.cyber-card::before {
  content: '';
  position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
  border-radius: 17px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  z-index: -1;
  opacity: 0.15;
}
.sec-label {
  font-family: 'Philosopher', serif;
  font-size: .85rem; font-weight: 700;
  color: var(--primary);
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-bottom: 16px;
  text-shadow: 0 0 10px rgba(200, 150, 12, 0.2);
}

/* ── Avatar ring ── */
.avatar-ring {
  position: relative;
  width: 120px; height: 120px;
  border-radius: 20px; margin: 0 auto;
}
.avatar-ring::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 23px;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--gold));
  background-size: 200% 200%;
  animation: gradShift 3s ease infinite;
  z-index: 0;
  box-shadow: 0 0 20px rgba(200,150,12,.4);
}
@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
#avatarImg {
  position: relative; z-index: 1;
  width: 120px; height: 120px; border-radius: 18px;
  object-fit: cover; display: block; background: #160e1c;
}

/* ── Fields ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: .75rem; font-weight: 700;
  color: var(--text-muted); letter-spacing: 1.5px;
  margin-bottom: 7px; text-transform: uppercase;
}
.field input, .field select {
  width: 100%; padding: 12px 14px;
  background: rgba(184,115,51,.04);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: .95rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
  font-family: 'Lora', serif;
}
.field input:focus, .field select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--glow);
}
.field select option { background: var(--bg); color: var(--text); }

/* ── Gender ── */
.gender-row { display: flex; gap: 10px; }
.gender-btn {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: rgba(184,115,51,.03);
  color: rgba(212,196,160,.6); font-size: .95rem;
  cursor: pointer; font-weight: 700; transition: all .2s;
  font-family: 'Lora', serif;
}
.gender-btn.active-nam {
  border-color: var(--primary);
  background: rgba(200,150,12,.15); color: var(--primary);
  box-shadow: 0 0 12px var(--glow);
}
.gender-btn.active-nu {
  border-color: var(--secondary);
  background: rgba(192,51,46,.15); color: var(--secondary);
  box-shadow: 0 0 12px rgba(192,51,46,.25);
}

/* ── Character grid ── */
.char-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.char-card {
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-areas: 
    "emoji name"
    "emoji desc";
  align-items: center;
  text-align: left;
  column-gap: 8px;
  padding: 8px 10px; border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .25s; position: relative;
  background: rgba(184,115,51,.02);
  font-family: 'Lora', serif;
}
.char-card:active { transform: scale(.95); }
.char-card .em { grid-area: emoji; font-size: 1.5rem; margin-bottom: 0; }
.char-card .nm { grid-area: name; font-size: .8rem; font-weight: 700; align-self: end; margin: 0; }
.char-card .desc { grid-area: desc; font-size: .65rem; opacity: 0.8; align-self: start; margin: 0; }
.char-card .badge {
  position: absolute; top: -5px; right: -5px;
  font-size: .7rem; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-weight: 700; display: none;
  background: var(--c); color: #fff;
}
.char-card.selected .badge { display: flex; }

.char-chien_binh { --c: #C0332E; } /* Lạc Tướng */
.char-phu_thuy   { --c: #C8960C; } /* Đạo Sĩ */
.char-xa_thu     { --c: #15803D; } /* Nỏ Thần */
.char-hiep_si    { --c: #B87333; } /* Thần Tướng */

.char-card.selected { border-color: var(--c); background: rgba(184,115,51,.08); box-shadow: 0 0 14px color-mix(in srgb, var(--c) 40%, transparent); }
.char-chien_binh .nm { color: var(--c); }
.char-phu_thuy   .nm { color: var(--c); }
.char-xa_thu     .nm { color: var(--c); }
.char-hiep_si    .nm { color: var(--c); }

/* ── Save / Exit bar ── */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 16px max(14px, env(safe-area-inset-bottom));
  background: linear-gradient(0deg, var(--bg) 80%, transparent);
  max-width: 480px; margin: 0 auto;
}
.btn-save {
  flex: 1.5; padding: 15px;
  border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  font-family: 'Philosopher', serif;
  font-size: 1.05rem; font-weight: 900; letter-spacing: 2px;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 0 24px rgba(200,150,12,.4);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-save:active { transform: scale(.98); }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.btn-exit {
  flex: 1; padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(192,51,46,.4);
  background: rgba(192,51,46,.08);
  color: var(--secondary);
  font-family: 'Philosopher', serif;
  font-size: 1.05rem; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-exit:active { transform: scale(.98); background: rgba(192,51,46,.2); }

.spin-sm {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid transparent; border-top-color: #000;
  animation: spin .7s linear infinite; display: inline-block;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 10px;
  font-size: .88rem; font-weight: 700;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  white-space: nowrap; z-index: 9999;
}
.toast.show { opacity: 1; }

/* ── Crop Modal ── */
#cropModal {
  position: fixed; inset: 0; z-index: 800;
  background: rgba(8,5,2,.97);
  display: none; flex-direction: column;
  align-items: center; gap: 0;
  padding: 0;
}
.crop-header {
  width: 100%; padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  background: rgba(184,115,51,.04);
}
.crop-header h3 {
  font-family: 'Philosopher', serif;
  font-size: 1.15rem; font-weight: 700;
  color: var(--primary); letter-spacing: 2px;
}
.crop-header p { font-size: .72rem; color: rgba(212,196,160,.4); margin-top: 4px; }
.crop-container {
  flex: 1; width: 100%; overflow: hidden;
  background: #000;
  max-height: calc(100vh - 180px);
}
.crop-container img { display: block; max-width: 100%; }
.crop-footer {
  width: 100%; padding: 14px 16px max(16px, env(safe-area-inset-bottom));
  display: flex; gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.btn-crop-ok {
  flex: 2; padding: 14px;
  border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff; font-family: 'Philosopher', serif;
  font-size: 1rem; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; box-shadow: 0 0 16px rgba(200,150,12,.35);
}
.btn-crop-cancel {
  flex: 1; padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(192,51,46,.4);
  background: rgba(192,51,46,.08);
  color: var(--secondary); font-size: .9rem; font-weight: 700;
  cursor: pointer;
}

/* Cropper.js overrides — circular crop box */
.cropper-view-box { border-radius: 50%; outline: 2px solid var(--primary); }
.cropper-face { background: transparent; }
.cropper-line { background-color: var(--primary); opacity: .5; }
.cropper-point { background-color: var(--primary); }
.cropper-bg { background: #160e1c; }
.cropper-modal { opacity: .65; }

@media (max-width: 400px) {
  .cyber-card { margin: 12px 12px 0; padding: 16px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadOverlay">
  <div class="spinner"></div>
  <div class="load-txt">ĐANG TẢI HỒ SƠ...</div>
</div>

<div class="wrap" id="mainContent" style="display:none">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-icon">🏅</div>
    <div class="hdr-info">
      <div class="hdr-title">Hồ Sơ Chiến Binh</div>
      <div class="hdr-sub">VINASTUDY · CẬP NHẬT THÔNG TIN</div>
    </div>
  </div>

  <!-- ── Avatar card ── -->
  <div class="cyber-card" style="text-align: center;">
    <div class="sec-label">Nhân vật của em</div>
    <div class="avatar-ring">
      <img id="avatarImg" src="/static/avatars/chien_binh_nam.jpg" alt="Avatar">
    </div>
  </div>

  <!-- ── Info card ── -->
  <div class="cyber-card">
    <div class="sec-label">Thông tin cá nhân</div>
    <div class="field">
      <label>Họ và tên</label>
      <input type="text" id="inputName" placeholder="Nhập họ và tên đầy đủ">
    </div>
    <div class="field">
      <label>Lớp</label>
      <select id="inputLop">
        <option value="3">Lớp 3</option>
        <option value="4">Lớp 4</option>
        <option value="5">Lớp 5</option>
      </select>
    </div>
    <div class="field">
      <label>Giới tính</label>
      <div class="gender-row">
        <button type="button" id="btnNam" class="gender-btn" onclick="selectGender('nam')">♂ Nam</button>
        <button type="button" id="btnNu"  class="gender-btn" onclick="selectGender('nu')">♀ Nữ</button>
      </div>
    </div>
  </div>

  <!-- ── Character card ── -->
  <div class="cyber-card">
    <div class="sec-label">Nhân vật</div>
    <div class="char-grid">
      <div class="char-card char-chien_binh" data-char="chien_binh" onclick="selectChar(this)">
        <span class="em">⚔️</span>
        <div class="nm">Lạc Tướng</div>
        <div class="desc">Mạnh mẽ, kiên định</div>
        <span class="badge">✓</span>
      </div>
      <div class="char-card char-phu_thuy" data-char="phu_thuy" onclick="selectChar(this)">
        <span class="em">🔮</span>
        <div class="nm">Đạo Sĩ</div>
        <div class="desc">Thông minh, sáng tạo</div>
        <span class="badge">✓</span>
      </div>
      <div class="char-card char-xa_thu" data-char="xa_thu" onclick="selectChar(this)">
        <span class="em">🏹</span>
        <div class="nm">Nỏ Thần</div>
        <div class="desc">Nhanh nhẹn, chính xác</div>
        <span class="badge">✓</span>
      </div>
      <div class="char-card char-hiep_si" data-char="hiep_si" onclick="selectChar(this)">
        <span class="em">🛡️</span>
        <div class="nm">Thần Tướng</div>
        <div class="desc">Dũng cảm, bảo vệ</div>
        <span class="badge">✓</span>
      </div>
    </div>
  </div>

  <div style="height:90px"></div>
</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar" style="display:none">
  <div style="display: flex; gap: 10px; width: 100%;">
    <button class="btn-exit" id="btnExit" onclick="exitProfile()">🚪 THOÁT</button>
    <button class="btn-save" id="btnSave" onclick="saveProfile()">💾 LƯU HỒ SƠ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Telegram init ─────────────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor?.('#050a1f'); }

const CHARS = {
  chien_binh: { emoji: '⚔️' },
  phu_thuy:   { emoji: '🔮' },
  xa_thu:     { emoji: '🏹' },
  hiep_si:    { emoji: '🛡️' },
};

let tgId          = null;
let currentChar   = 'chien_binh';
let currentGender = 'nam';

/* ── Resolve tgId — 3 fallbacks ─────────────────────────────────────── */
function resolveTgId() {
  // 1️⃣ Telegram WebApp context (opened via web_app= button)
  const fromTg = tg?.initDataUnsafe?.user?.id;
  if (fromTg) return fromTg;

  // 2️⃣ URL param ?tg_id=... (iframe from map, or url= button)
  const fromUrl = parseInt(new URLSearchParams(location.search).get('tg_id')) || 0;
  if (fromUrl) return fromUrl;

  // 3️⃣ localStorage (stored by map.html authGate)
  const fromStorage = parseInt(localStorage.getItem('vsTgId')) || 0;
  return fromStorage || null;
}

/* ── Load profile ────────────────────────────────────────────────────── */
(async function load() {
  tgId = resolveTgId();
  if (!tgId) {
    showError('⚠️ Không xác định được tài khoản.<br><br>Hãy mở từ bot Telegram nhé!');
    return;
  }

  try {
    const res  = await fetch(`/api/student/tg-status?tg_id=${tgId}`);
    const data = await res.json();

    if (data.status !== 'approved') {
      if (data.status === 'pending') {
        showError(`⏳ Hồ sơ đang chờ thầy duyệt!<br><br>
          <span style="color:rgba(200,230,255,.6);font-size:.85rem">Thầy sẽ thông báo qua Telegram khi được duyệt.</span><br><br>
          <button onclick="window.close()" 
             style="display:inline-block;padding:12px 28px;background:var(--primary);border:none;color:#fff;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Philosopher',serif;letter-spacing:1px;box-shadow:0 4px 15px rgba(200,150,12,0.3)">         🤖 Mở Telegram Bot
          </button>`);
      } else {
        showError('❌ Chưa đăng ký. Hãy đăng ký trước!');
      }
      return;
    }

    fillForm(data);
    document.getElementById('loadOverlay').style.display  = 'none';
    document.getElementById('mainContent').style.display  = '';
    document.getElementById('saveBar').style.display      = '';
  } catch(e) {
    showError('🔌 Lỗi kết nối. Thử lại sau!');
  }
})();

function showError(msg) {
  document.getElementById('loadOverlay').innerHTML =
    `<div style="text-align:center;padding:28px 20px;font-size:.95rem;
       color:var(--danger);line-height:1.8">${msg}</div>`;
}

function updateAvatarPreview() {
  const gender_suffix = currentGender === 'nu' ? 'nu' : 'nam';
  document.getElementById('avatarImg').src = `/static/avatars/${currentChar}_${gender_suffix}.jpg`;
}

function fillForm(data) {
  document.getElementById('inputName').value = data.ho_ten || '';
  document.getElementById('inputLop').value  = data.lop   || '3';
  currentChar   = data.character_type || 'chien_binh';
  currentGender = data.gioi_tinh      || 'nam';
  selectGender(currentGender);

  // Character
  document.querySelectorAll('.char-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.char === currentChar));
  updateAvatarPreview();
}

/* ── Gender ──────────────────────────────────────────────────────────── */
function selectGender(gt) {
  currentGender = gt;
  document.getElementById('btnNam').className = 'gender-btn' + (gt === 'nam' ? ' active-nam' : '');
  document.getElementById('btnNu').className  = 'gender-btn' + (gt === 'nu'  ? ' active-nu'  : '');
  updateAvatarPreview();
}

/* ── Character ───────────────────────────────────────────────────────── */
function selectChar(el) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentChar = el.dataset.char;
  updateAvatarPreview();
}

/* ── Save ────────────────────────────────────────────────────────────── */
async function saveProfile() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { showToast('Chưa nhập tên!', false); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin-sm"></div>&nbsp;ĐANG LƯU...';

  const body = {
    tg_id:          tgId,
    ho_ten:         name,
    lop:            document.getElementById('inputLop').value,
    gioi_tinh:      currentGender,
    character_type: currentChar,
  };

  try {
    const res  = await fetch('/api/student/tg-profile', {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      showToast(data.detail || 'Lỗi lưu hồ sơ!', false);
      btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';
      return;
    }

    showToast('✅ Đã lưu hồ sơ!', true);
    btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';

  } catch(e) {
    showToast('🔌 Lỗi kết nối!', false);
    btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';
  }
}

/* ── Exit Profile ────────────────────────────────────────────────────── */
function exitProfile() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage('close_profile', '*');
  } else {
    window.location.href = '/map';
  }
}

/* ── Logout ──────────────────────────────────────────────────────────── */
function logOut() {
  if (!confirm('Bạn có chắc muốn đăng xuất không?')) return;
  localStorage.removeItem('vsToken');
  localStorage.removeItem('vsTgId');
  window.location.href = '/register';
}

/* ── Toast ───────────────────────────────────────────────────────────── */
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--success)' : 'var(--danger)';
  t.style.color      = ok ? '#000' : '#fff';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
