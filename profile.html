<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hồ Sơ Chiến Binh</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
:root {
  --primary:   #0ae0fe;
  --secondary: #ea0eed;
  --success:   #4eff9f;
  --danger:    #ff0055;
  --gold:      #ffd700;
  --bg:        #050a1f;
  --card:      #080e22;
  --border:    rgba(10,224,254,.22);
  --text:      #c8e6ff;
  --glow:      0 0 18px rgba(10,224,254,.45);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(10,224,254,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,224,254,.045) 1px, transparent 1px);
  background-size: 32px 32px;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding-bottom: 110px;
}

/* ── Loading ── */
#loadOverlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.spinner {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--primary); border-left-color: var(--secondary);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; letter-spacing: 3px;
  color: var(--primary); text-shadow: 0 0 10px var(--primary);
}

/* ── Header ── */
.hdr {
  padding: 18px 20px 14px;
  background: linear-gradient(180deg, rgba(10,224,254,.07) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.hdr-icon { font-size: 1.7rem; }
.hdr-info { flex: 1; }
.hdr-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.25rem; font-weight: 900;
  color: var(--primary); text-shadow: var(--glow);
  letter-spacing: 2px; text-transform: uppercase;
}
.hdr-sub { font-size: .68rem; color: rgba(200,230,255,.35); margin-top: 2px; letter-spacing: 1.5px; }
.btn-logout {
  padding: 8px 12px;
  border-radius: 8px; border: 1px solid rgba(255,0,85,.4);
  background: rgba(255,0,85,.08);
  color: var(--danger); font-size: .78rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .18s;
}
.btn-logout:active { background: rgba(255,0,85,.2); }

/* ── Cyber card ── */
.cyber-card {
  position: relative; z-index: 1;
  border-radius: 16px;
  background: var(--card);
  padding: 20px;
  margin: 16px 16px 0;
}
.cyber-card::before {
  content: '';
  position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
  border-radius: 17px;
  background: linear-gradient(135deg, rgba(10,224,254,.55), rgba(234,14,237,.55));
  z-index: -1;
}
.sec-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: .68rem; font-weight: 700;
  color: rgba(200,230,255,.4);
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── Avatar hero ── */
.avatar-hero { display: flex; flex-direction: column; align-items: center; gap: 16px; }

.avatar-ring {
  position: relative;
  width: 98px; height: 130px;
  border-radius: 18px;
}
.avatar-ring::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 21px;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--success));
  background-size: 200% 200%;
  animation: gradShift 3s ease infinite;
  z-index: 0;
  box-shadow: 0 0 20px rgba(10,224,254,.4);
}
@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.avatar-ph {
  position: relative; z-index: 1;
  width: 98px; height: 130px; border-radius: 16px;
  background: #0a1428;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem;
}
#avatarImg {
  position: relative; z-index: 1;
  width: 98px; height: 130px; border-radius: 16px;
  object-fit: cover; object-position: top center; display: none;
}

.avatar-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.btn-av {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 14px; border-radius: 9px;
  border: 1px solid var(--border);
  background: rgba(10,224,254,.06);
  color: var(--primary); font-size: .82rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .18s;
}
.btn-av:active { transform: scale(.95); background: rgba(10,224,254,.14); }
.btn-av.cam-active { border-color: var(--secondary); color: var(--secondary); }

/* ── Camera ── */
.cam-wrap {
  margin-top: 14px; border-radius: 12px; overflow: hidden;
  background: #000; border: 1px solid var(--border);
  position: relative; aspect-ratio: 4/3; display: none;
}
.cam-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
.face-guide {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-55%);
  width: 52%; aspect-ratio: 1;
  border: 2px dashed rgba(10,224,254,.8); border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,.35), 0 0 20px rgba(10,224,254,.3);
}
canvas#snap { display: none; }
.cam-actions { display: flex; gap: 8px; margin-top: 10px; }
.cam-actions .btn-av { flex: 1; justify-content: center; }
.btn-snap {
  background: rgba(10,224,254,.18) !important;
  border-color: var(--primary) !important;
  box-shadow: 0 0 12px rgba(10,224,254,.3);
}

/* ── Preview strip ── */
.preview-strip {
  display: none; gap: 12px; justify-content: center;
  margin-top: 16px; padding-top: 16px;
  border-top: 1px solid var(--border);
}
.pv-item { text-align: center; }
.pv-item img {
  width: 72px; height: 72px; border-radius: 10px;
  object-fit: cover; border: 1px solid var(--border); display: block;
  background: #0a1428;
}
.pv-final img {
  width: 72px; height: 96px;
  border-color: var(--primary);
  box-shadow: 0 0 16px rgba(10,224,254,.4);
  object-position: top center;
}
.pv-item p { font-size: .62rem; color: rgba(200,230,255,.35); margin-top: 5px; }

.gen-spinner { display: none; text-align: center; padding: 20px; }
.gen-spinner p { font-size: .8rem; color: rgba(200,230,255,.45); margin-top: 8px; }

/* ── Fields ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: .68rem; font-weight: 700;
  color: rgba(200,230,255,.45); letter-spacing: 1.5px;
  margin-bottom: 7px; text-transform: uppercase;
}
.field input, .field select {
  width: 100%; padding: 12px 14px;
  background: rgba(10,224,254,.04);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: .95rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(10,224,254,.12);
}
.field select option { background: #0d1b3e; }

/* ── Gender ── */
.gender-row { display: flex; gap: 10px; }
.gender-btn {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: rgba(10,224,254,.03);
  color: rgba(200,230,255,.6); font-size: .95rem;
  cursor: pointer; font-weight: 700; transition: all .2s;
}
.gender-btn.active-nam {
  border-color: var(--primary);
  background: rgba(10,224,254,.15); color: var(--primary);
  box-shadow: 0 0 12px rgba(10,224,254,.25);
}
.gender-btn.active-nu {
  border-color: var(--secondary);
  background: rgba(234,14,237,.15); color: var(--secondary);
  box-shadow: 0 0 12px rgba(234,14,237,.25);
}

/* ── Character grid ── */
.char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.char-card {
  padding: 16px 10px; border-radius: 12px;
  border: 1.5px solid var(--border);
  cursor: pointer; text-align: center;
  transition: all .2s;
  background: rgba(10,224,254,.02);
}
.char-card:active { transform: scale(.95); }
.char-card .em { font-size: 2rem; display: block; margin-bottom: 5px; }
.char-card .nm { font-size: .8rem; font-weight: 700; letter-spacing: .5px; }
.char-chien_binh.selected { border-color: var(--primary); background: rgba(10,224,254,.08); box-shadow: 0 0 14px rgba(10,224,254,.3); }
.char-phu_thuy.selected   { border-color: var(--secondary); background: rgba(234,14,237,.08); box-shadow: 0 0 14px rgba(234,14,237,.3); }
.char-xa_thu.selected     { border-color: var(--success); background: rgba(78,255,159,.08); box-shadow: 0 0 14px rgba(78,255,159,.3); }
.char-hiep_si.selected    { border-color: var(--gold); background: rgba(255,215,0,.08); box-shadow: 0 0 14px rgba(255,215,0,.3); }
.char-chien_binh .nm { color: var(--primary); }
.char-phu_thuy   .nm { color: var(--secondary); }
.char-xa_thu     .nm { color: var(--success); }
.char-hiep_si    .nm { color: var(--gold); }

/* ── Save bar ── */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 16px max(14px, env(safe-area-inset-bottom));
  background: linear-gradient(0deg, rgba(5,10,31,.98) 80%, transparent);
  max-width: 480px; margin: 0 auto;
}
.btn-save {
  width: 100%; padding: 15px;
  border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--primary) 0%, #0090c8 100%);
  color: #000;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem; font-weight: 900; letter-spacing: 2px;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 0 24px rgba(10,224,254,.4);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-save:active { transform: scale(.98); }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.spin-sm {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid transparent; border-top-color: #000;
  animation: spin .7s linear infinite; display: inline-block;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 10px;
  font-size: .88rem; font-weight: 700;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  white-space: nowrap; z-index: 9999;
}
.toast.show { opacity: 1; }

/* ── Crop Modal ── */
#cropModal {
  position: fixed; inset: 0; z-index: 800;
  background: rgba(5,10,31,.97);
  display: none; flex-direction: column;
  align-items: center; gap: 0;
  padding: 0;
}
.crop-header {
  width: 100%; padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  background: rgba(10,224,254,.04);
}
.crop-header h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.15rem; font-weight: 900;
  color: var(--primary); letter-spacing: 2px;
}
.crop-header p { font-size: .72rem; color: rgba(200,230,255,.4); margin-top: 4px; }
.crop-container {
  flex: 1; width: 100%; overflow: hidden;
  background: #000;
  max-height: calc(100vh - 180px);
}
.crop-container img { display: block; max-width: 100%; }
.crop-footer {
  width: 100%; padding: 14px 16px max(16px, env(safe-area-inset-bottom));
  display: flex; gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.btn-crop-ok {
  flex: 2; padding: 14px;
  border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--primary), #0090c8);
  color: #000; font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 900; letter-spacing: 1px;
  cursor: pointer; box-shadow: 0 0 16px rgba(10,224,254,.35);
}
.btn-crop-cancel {
  flex: 1; padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,0,85,.4);
  background: rgba(255,0,85,.08);
  color: var(--danger); font-size: .9rem; font-weight: 700;
  cursor: pointer;
}

/* Cropper.js overrides — circular crop box */
.cropper-view-box { border-radius: 50%; outline: 2px solid var(--primary); }
.cropper-face { background: transparent; }
.cropper-line { background-color: var(--primary); opacity: .5; }
.cropper-point { background-color: var(--primary); }
.cropper-bg { background: #0a1428; }
.cropper-modal { opacity: .65; }

@media (max-width: 400px) {
  .cyber-card { margin: 12px 12px 0; padding: 16px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadOverlay">
  <div class="spinner"></div>
  <div class="load-txt">ĐANG TẢI HỒ SƠ...</div>
</div>

<!-- ════════════ CROP MODAL ════════════ -->
<div id="cropModal">
  <div class="crop-header">
    <h3>✂️ CẮT ẢNH ĐẠI DIỆN</h3>
    <p>Kéo ảnh để căn chỉnh · Thu/phóng bằng 2 ngón tay</p>
  </div>
  <div class="crop-container">
    <img id="cropImg" src="" alt="">
  </div>
  <div class="crop-footer">
    <button class="btn-crop-cancel" onclick="cancelCrop()">✕ Huỷ</button>
    <button class="btn-crop-ok"     onclick="confirmCrop()">✅ Dùng ảnh này</button>
  </div>
</div>

<!-- ════════════ MAIN CONTENT ════════════ -->
<div class="wrap" id="mainContent" style="display:none">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-icon">🏅</div>
    <div class="hdr-info">
      <div class="hdr-title">Hồ Sơ Chiến Binh</div>
      <div class="hdr-sub">VINASTUDY · CẬP NHẬT THÔNG TIN</div>
    </div>
    <button class="btn-logout" onclick="logOut()">🚪 Thoát</button>
  </div>

  <!-- ── Avatar card ── -->
  <div class="cyber-card">
    <div class="sec-label">Ảnh đại diện</div>
    <div class="avatar-hero">

      <!-- Avatar display -->
      <div class="avatar-ring">
        <div class="avatar-ph" id="avatarPh">⚔️</div>
        <img id="avatarImg" src="" alt="Avatar">
      </div>

      <!-- Buttons -->
      <div class="avatar-btns">
        <button class="btn-av" id="btnOpenCam" onclick="openCamera()">📷 Chụp ảnh</button>
        <button class="btn-av" onclick="document.getElementById('fileInput').click()">📁 Tải lên &amp; Cắt</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileSelect(event)">
      </div>
    </div>

    <!-- Camera -->
    <div class="cam-wrap" id="camWrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="face-guide"></div>
    </div>
    <canvas id="snap"></canvas>
    <div class="cam-actions" id="camActions" style="display:none">
      <button class="btn-av" onclick="stopCamera()">✕ Huỷ</button>
      <button class="btn-av btn-snap" onclick="snapPhoto()">📸 Chụp ngay</button>
    </div>

    <!-- Preview -->
    <div class="preview-strip" id="previewStrip">
      <div class="pv-item">
        <img id="pvFace" src="" alt="">
        <p>Ảnh gốc</p>
      </div>
      <div class="pv-item">
        <img id="pvCartoon" src="" alt="">
        <p>Hoạt hình</p>
      </div>
      <div class="pv-item pv-final">
        <img id="pvFinal" src="" alt="">
        <p>Avatar</p>
      </div>
    </div>

    <!-- Gen spinner -->
    <div class="gen-spinner" id="genSpinner">
      <div class="spinner" style="margin:0 auto"></div>
      <p>🎨 Đang tạo avatar hoạt hình...</p>
    </div>
  </div>

  <!-- ── Info card ── -->
  <div class="cyber-card">
    <div class="sec-label">Thông tin cá nhân</div>
    <div class="field">
      <label>Họ và tên</label>
      <input type="text" id="inputName" placeholder="Nhập họ và tên đầy đủ">
    </div>
    <div class="field">
      <label>Lớp</label>
      <select id="inputLop">
        <option value="3">Lớp 3</option>
        <option value="4">Lớp 4</option>
        <option value="5">Lớp 5</option>
      </select>
    </div>
    <div class="field">
      <label>Giới tính</label>
      <div class="gender-row">
        <button type="button" id="btnNam" class="gender-btn" onclick="selectGender('nam')">♂ Nam</button>
        <button type="button" id="btnNu"  class="gender-btn" onclick="selectGender('nu')">♀ Nữ</button>
      </div>
    </div>
  </div>

  <!-- ── Character card ── -->
  <div class="cyber-card">
    <div class="sec-label">Nhân vật</div>
    <div class="char-grid">
      <div class="char-card char-chien_binh" data-char="chien_binh" onclick="selectChar(this)">
        <span class="em">⚔️</span><div class="nm">Chiến Binh</div>
      </div>
      <div class="char-card char-phu_thuy" data-char="phu_thuy" onclick="selectChar(this)">
        <span class="em">🔮</span><div class="nm">Phù Thủy</div>
      </div>
      <div class="char-card char-xa_thu" data-char="xa_thu" onclick="selectChar(this)">
        <span class="em">🏹</span><div class="nm">Xạ Thủ</div>
      </div>
      <div class="char-card char-hiep_si" data-char="hiep_si" onclick="selectChar(this)">
        <span class="em">🛡️</span><div class="nm">Hiệp Sĩ</div>
      </div>
    </div>
  </div>

  <div style="height:90px"></div>
</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar" style="display:none">
  <button class="btn-save" id="btnSave" onclick="saveProfile()">💾 LƯU HỒ SƠ</button>
</div>

<div class="toast" id="toast"></div>

<!-- Cropper.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
/* ── Telegram init ─────────────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor?.('#050a1f'); }

const CHARS = {
  chien_binh: { emoji: '⚔️' },
  phu_thuy:   { emoji: '🔮' },
  xa_thu:     { emoji: '🏹' },
  hiep_si:    { emoji: '🛡️' },
};

let tgId          = null;
let currentChar   = 'chien_binh';
let currentGender = 'nam';
let newFaceB64    = null;
let stream        = null;
let cropper       = null;

/* ── Resolve tgId — 3 fallbacks ─────────────────────────────────────── */
function resolveTgId() {
  // 1️⃣ Telegram WebApp context (opened via web_app= button)
  const fromTg = tg?.initDataUnsafe?.user?.id;
  if (fromTg) return fromTg;

  // 2️⃣ URL param ?tg_id=... (iframe from map, or url= button)
  const fromUrl = parseInt(new URLSearchParams(location.search).get('tg_id')) || 0;
  if (fromUrl) return fromUrl;

  // 3️⃣ localStorage (stored by map.html authGate)
  const fromStorage = parseInt(localStorage.getItem('vsTgId')) || 0;
  return fromStorage || null;
}

/* ── Load profile ────────────────────────────────────────────────────── */
(async function load() {
  tgId = resolveTgId();
  if (!tgId) {
    showError('⚠️ Không xác định được tài khoản.<br><br>Hãy mở từ bot Telegram nhé!');
    return;
  }

  try {
    const res  = await fetch(`/api/student/tg-status?tg_id=${tgId}`);
    const data = await res.json();

    if (data.status !== 'approved') {
      if (data.status === 'pending') {
        showError(`⏳ Hồ sơ đang chờ thầy duyệt!<br><br>
          <span style="color:rgba(200,230,255,.6);font-size:.85rem">Thầy sẽ thông báo qua Telegram khi được duyệt.</span><br><br>
          <button onclick="window.close()" 
             style="display:inline-block;padding:12px 28px;background:var(--primary);border:none;color:#000;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;box-shadow:0 4px 15px rgba(10,224,254,0.3)">         🤖 Mở Telegram Bot
          </button>`);
      } else {
        showError('❌ Chưa đăng ký. Hãy đăng ký trước!');
      }
      return;
    }

    fillForm(data);
    document.getElementById('loadOverlay').style.display  = 'none';
    document.getElementById('mainContent').style.display  = '';
    document.getElementById('saveBar').style.display      = '';
  } catch(e) {
    showError('🔌 Lỗi kết nối. Thử lại sau!');
  }
})();

function showError(msg) {
  document.getElementById('loadOverlay').innerHTML =
    `<div style="text-align:center;padding:28px 20px;font-size:.95rem;
       color:var(--danger);line-height:1.8">${msg}</div>`;
}

function fillForm(data) {
  document.getElementById('inputName').value = data.ho_ten || '';
  document.getElementById('inputLop').value  = data.lop   || '3';
  currentChar   = data.character_type || 'chien_binh';
  currentGender = data.gioi_tinh      || 'nam';
  selectGender(currentGender);

  // Avatar
  if (data.avatar_final) {
    document.getElementById('avatarImg').src          = data.avatar_final;
    document.getElementById('avatarImg').style.display = '';
    document.getElementById('avatarPh').style.display  = 'none';
  } else {
    document.getElementById('avatarPh').textContent = CHARS[data.character_type]?.emoji || '⚔️';
  }

  // Character
  document.querySelectorAll('.char-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.char === currentChar));
}

/* ── Gender ──────────────────────────────────────────────────────────── */
function selectGender(gt) {
  currentGender = gt;
  document.getElementById('btnNam').className = 'gender-btn' + (gt === 'nam' ? ' active-nam' : '');
  document.getElementById('btnNu').className  = 'gender-btn' + (gt === 'nu'  ? ' active-nu'  : '');
}

/* ── Character ───────────────────────────────────────────────────────── */
function selectChar(el) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentChar = el.dataset.char;
}

/* ── Camera ──────────────────────────────────────────────────────────── */
async function openCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    document.getElementById('video').srcObject = stream;
    document.getElementById('camWrap').style.display    = '';
    document.getElementById('camActions').style.display = 'flex';
    document.getElementById('btnOpenCam').style.display = 'none';
    document.getElementById('previewStrip').style.display = 'none';
  } catch(e) {
    showToast('Không mở được camera!', false);
  }
}

function snapPhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('snap');
  const SIZE   = 512;
  canvas.width = canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const vw = video.videoWidth, vh = video.videoHeight;
  const side = Math.min(vw, vh);
  ctx.drawImage(video, (vw - side) / 2, (vh - side) / 2, side, side, 0, 0, SIZE, SIZE);
  newFaceB64 = canvas.toDataURL('image/jpeg', .88);
  stopCamera();
  showPreview();
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('camWrap').style.display    = 'none';
  document.getElementById('camActions').style.display = 'none';
  document.getElementById('btnOpenCam').style.display = '';
}

/* ── File Upload + Crop ──────────────────────────────────────────────── */
function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // reset để chọn lại cùng file được
  const reader = new FileReader();
  reader.onload = ev => openCropModal(ev.target.result);
  reader.readAsDataURL(file);
}

function openCropModal(src) {
  const img = document.getElementById('cropImg');
  document.getElementById('cropModal').style.display = 'flex';

  // Destroy cropper cũ
  if (cropper) { cropper.destroy(); cropper = null; }

  img.src = '';
  img.onload = function() {
    cropper = new Cropper(img, {
      aspectRatio: 1,        // vuông
      viewMode: 1,           // không crop ra ngoài ảnh
      dragMode: 'move',      // kéo ảnh, crop box cố định
      autoCropArea: 0.85,
      restore: false,
      guides: false,
      center: false,
      highlight: false,
      cropBoxMovable: false,   // crop box không di chuyển
      cropBoxResizable: false, // crop box không resize
      toggleDragModeOnDblclick: false,
    });
  };
  img.src = src;
}

function confirmCrop() {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({ width: 512, height: 512 });
  newFaceB64 = canvas.toDataURL('image/jpeg', .88);
  cropper.destroy(); cropper = null;
  document.getElementById('cropModal').style.display = 'none';
  showPreview();
}

function cancelCrop() {
  if (cropper) { cropper.destroy(); cropper = null; }
  document.getElementById('cropModal').style.display = 'none';
}

/* ── Preview ─────────────────────────────────────────────────────────── */
function showPreview() {
  document.getElementById('pvFace').src    = newFaceB64;
  document.getElementById('pvCartoon').src = '';
  document.getElementById('pvFinal').src   = '';
  document.getElementById('previewStrip').style.display = 'flex';
}

/* ── Save ────────────────────────────────────────────────────────────── */
async function saveProfile() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { showToast('Chưa nhập tên!', false); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin-sm"></div>&nbsp;ĐANG LƯU...';

  if (newFaceB64) {
    document.getElementById('genSpinner').style.display  = '';
    document.getElementById('previewStrip').style.display = 'none';
  }

  const body = {
    tg_id:          tgId,
    ho_ten:         name,
    lop:            document.getElementById('inputLop').value,
    gioi_tinh:      currentGender,
    character_type: currentChar,
  };
  if (newFaceB64) body.avatar_face_b64 = newFaceB64;

  try {
    const res  = await fetch('/api/student/tg-profile', {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    document.getElementById('genSpinner').style.display = 'none';

    if (!res.ok) {
      showToast(data.detail || 'Lỗi lưu hồ sơ!', false);
      btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';
      return;
    }

    // Cập nhật avatar hiển thị
    if (data.avatar_final) {
      document.getElementById('avatarImg').src           = data.avatar_final;
      document.getElementById('avatarImg').style.display = '';
      document.getElementById('avatarPh').style.display  = 'none';
      document.getElementById('pvFinal').src = data.avatar_final;
      if (data.avatar_cartoon) document.getElementById('pvCartoon').src = data.avatar_cartoon;
      document.getElementById('previewStrip').style.display = 'flex';
    }
    newFaceB64 = null;
    showToast('✅ Đã lưu hồ sơ!', true);
    btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';

  } catch(e) {
    document.getElementById('genSpinner').style.display = 'none';
    showToast('🔌 Lỗi kết nối!', false);
    btn.disabled = false; btn.innerHTML = '💾 LƯU HỒ SƠ';
  }
}

/* ── Logout ──────────────────────────────────────────────────────────── */
function logOut() {
  if (!confirm('Bạn có chắc muốn đăng xuất không?')) return;
  localStorage.removeItem('vsToken');
  localStorage.removeItem('vsTgId');
  window.location.href = '/register';
}

/* ── Toast ───────────────────────────────────────────────────────────── */
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--success)' : 'var(--danger)';
  t.style.color      = ok ? '#000' : '#fff';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
