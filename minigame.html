<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phân Biệt Số & Chữ Số</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ae0fe;
            --primary-glow: rgba(10, 224, 254, 0.5);
            --secondary: #ea0eed;
            --secondary-glow: rgba(234, 14, 237, 0.5);
            --success: #4eff9f;
            --danger: #ff0055;
            --bg-base: #050a1f;
            --bg-card: rgba(11, 19, 43, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(10, 224, 254, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            background-image: linear-gradient(rgba(5, 10, 31, 0.5), rgba(5, 10, 31, 0.9)), url('/static/images/boss_so_than__awakening.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, rgba(5,10,31,0.9) 0%, rgba(5,10,31,0) 100%);
        }

        .header h1 {
            margin: 0;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            margin-top: 10px;
            font-size: 16px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
        }

        .score-text { color: var(--success); text-shadow: 0 0 10px rgba(78, 255, 159, 0.5); }
        .time-text { color: var(--danger); text-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        .progress-text { color: var(--primary); text-align: center; margin-top: 5px; font-weight: bold; font-family: 'Chakra Petch', sans-serif; font-size: 16px;}

        .game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Swipe indicator behind the card or at the top */
        .swipe-indicator-container {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }
        
        .swipe-indicator {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 55px;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.1s, transform 0.1s;
        }

        .indicator-left { color: var(--secondary); text-shadow: 0 0 15px var(--secondary-glow); transform: scale(0.5) rotate(-15deg); }
        .indicator-right { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); transform: scale(0.5) rotate(15deg); }

        .card-container {
            position: relative;
            width: 320px;
            height: 440px;
            perspective: 1000px;
            touch-action: none; /* Prevent scroll while dragging */
        }

        .card {
            width: 100%;
            height: 100%;
            background-color: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px var(--primary-glow), inset 0 0 20px rgba(10,224,254,0.1);
            position: absolute;
            cursor: grab;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            will-change: transform;
        }
        
        .card.dragging {
            transition: none; /* Remove transition during drag */
            cursor: grabbing;
        }

        .card.swipe-left {
            transform: translateX(-300px) rotate(-20deg) !important;
            opacity: 0;
        }

        .card.swipe-right {
            transform: translateX(300px) rotate(20deg) !important;
            opacity: 0;
        }
        
        .card::before {
            content: ""; position: absolute; inset: 0; padding: 2px;
            border-radius: inherit; background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        .number-display {
            font-size: 160px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(10,224,254,0.8);
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .feedback.show {
            animation: popOut 0.8s forwards;
        }

        @keyframes popOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,10,31,0.95);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        .start-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Chakra Petch', sans-serif;
            border-radius: 30px;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 20px var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        
        .start-btn:hover {
            box-shadow: 0 0 40px var(--secondary-glow);
            transform: scale(1.05);
        }

        .instructions {
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
            font-size: 1.1rem;
            background: rgba(10,224,254,0.1);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .bottom-hint {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay">
        <h1 style="color: var(--primary); font-size: 3rem; margin-bottom: 20px; text-align: center; font-family: 'Chakra Petch', sans-serif; text-shadow: 0 0 20px var(--primary-glow); text-transform: uppercase;">PHÂN BIỆT<br>SỐ & CHỮ SỐ</h1>
        <div class="instructions">
            <p style="margin-bottom: 10px; font-weight: bold; color: var(--text-main);">LUẬT CHƠI:</p>
            <p style="color: var(--primary); font-weight: bold; margin-bottom: 5px;">👉 Vuốt sang Phải nếu là SỐ (> 9)</p>
            <p style="color: var(--secondary); font-weight: bold; margin-bottom: 15px;">👈 Vuốt sang Trái nếu là CHỮ SỐ (0-9)</p>
            <p style="font-size: 0.95rem;">(Có thể dùng chuột kéo hoặc vuốt trên màn hình)</p>
        </div>
        <button class="start-btn" onclick="startGame()">BẮT ĐẦU</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--danger); font-size: 3rem; font-family: 'Chakra Petch', sans-serif;">HẾT GIỜ!</h1>
        <h2 style="font-size: 1.5rem; font-weight: 400;">Điểm của bạn: <span id="finalScore" style="color: var(--primary); font-weight: bold;">0</span></h2>
        <button class="start-btn" onclick="startGame()">CHƠI LẠI</button>
    </div>

    <!-- Main Game -->
    <div class="header">
        <h1>Phân biệt Số & Chữ Số</h1>
        <div class="stats">
            <div class="score-text">ĐÚNG: <span id="scoreDisplay">0</span>/10</div>
            <div class="time-text">THỜI GIAN: <span id="timeDisplay">30</span>s</div>
        </div>
        <div class="progress-text">Câu: <span id="questionCountDisplay">1</span>/10</div>
    </div>
    
    <div class="swipe-indicator-container">
        <div class="swipe-indicator indicator-left" id="indLeft">CHỮ SỐ 👈</div>
        <div class="swipe-indicator indicator-right" id="indRight">👉 SỐ</div>
    </div>

    <div class="game-area">
        <div class="card-container" id="cardContainer">
            <!-- Cards will be generated here -->
        </div>
        <div id="feedback" class="feedback"></div>
    </div>
    
    <div class="bottom-hint">
        Kéo thẻ bài sang trái hoặc phải để trả lời
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const buoi = urlParams.get('buoi') || '1';
        
        let score = 0;
        let questionCount = 0;
        let timeLeft = 30;
        let gameInterval;
        let currentCardValue = 0;
        let isTrick = false;

        const cardContainer = document.getElementById('cardContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const questionCountDisplay = document.getElementById('questionCountDisplay');
        const feedbackEl = document.getElementById('feedback');
        const indLeft = document.getElementById('indLeft');
        const indRight = document.getElementById('indRight');
        
        const monsters = ['👾', '👽', '🤖', '👻', '👹', '💀', '🎃', '😈'];

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            score = 0;
            questionCount = 1;
            timeLeft = 30;
            scoreDisplay.innerText = score;
            questionCountDisplay.innerText = questionCount;
            timeDisplay.innerText = timeLeft;
            
            spawnCard();

            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame(true);
                }
            }, 1000);
        }

        function endGame(timeOut = false) {
            clearInterval(gameInterval);
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            const isWin = score >= 8;
            
            if (isWin) {
                // Save progress
                localStorage.setItem('cbToan_skill_bai' + buoi, 'true');
                
                document.getElementById('gameOverScreen').innerHTML = `
                    <h1 style="color: var(--success); font-size: 3rem; text-align: center; font-family: 'Chakra Petch', sans-serif; text-shadow: 0 0 20px rgba(78,255,159,0.5);">TUYỆT VỜI!</h1>
                    <h2 style="font-size: 1.2rem; text-align: center; color: #fff; font-weight: 400; margin-top: 10px;">Bạn đã trả lời đúng ${score}/10 câu.</h2>
                    <h2 style="font-size: 1.5rem; text-align: center; color: var(--primary); margin-bottom: 20px;">Bạn đã lĩnh ngộ TUYỆT CHIÊU!</h2>
                    <button class="start-btn" onclick="returnToMap()">QUAY LẠI ẢI</button>
                `;
            } else {
                document.getElementById('gameOverScreen').innerHTML = `
                    <h1 style="color: var(--danger); font-size: 3.5rem; font-family: 'Chakra Petch', sans-serif; text-shadow: 0 0 20px rgba(255,0,85,0.5);">THẤT BẠI</h1>
                    <h2 style="font-size: 1.2rem; text-align: center; color: #fff; font-weight: 400; line-height: 1.6; margin-top: 10px;">Bạn chỉ trả lời đúng ${score}/10 câu${timeOut ? ' (Hết giờ)' : ''}.<br>Cần ít nhất 8 câu đúng để qua ải.</h2>
                    <button class="start-btn" onclick="startGame()">THỬ LẠI</button>
                `;
            }
        }
        
        function returnToMap() {
            window.parent.postMessage('minigame_won', '*');
        }

        let currentCard;

        function spawnCard() {
            cardContainer.innerHTML = '';
            
            const rand = Math.random();
            isTrick = false;
            
            if (rand < 0.4) {
                currentCardValue = Math.floor(Math.random() * 10); // 0-9
            } else if (rand < 0.9) {
                currentCardValue = Math.floor(Math.random() * 990) + 10; // 10-999
            } else {
                currentCardValue = Math.floor(Math.random() * 89) + 11; // 11-99
                isTrick = true;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'activeCard';
            currentCard = card;
            
            const icon = monsters[Math.floor(Math.random() * monsters.length)];
            
            if (isTrick) {
                card.innerHTML = `
                    <div style="color: var(--danger); font-weight: bold; font-size: 1.2rem; text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,0,85,0.5);">"Ta là<br>CHỮ SỐ ${currentCardValue}!"</div>
                    <div class="number-display" style="font-size: 120px;">${currentCardValue}</div>
                `;
            } else {
                card.innerHTML = `
                    <div class="number-display">${currentCardValue}</div>
                `;
            }
            
            cardContainer.appendChild(card);
            
            // Setup swipe events
            setupSwipe(card);
        }
        
        function setupSwipe(card) {
            let isDragging = false;
            let startX = 0;
            let currentX = 0;
            
            // Mouse events
            card.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
            
            // Touch events
            card.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('touchend', dragEnd);
            
            function dragStart(e) {
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                } else {
                    startX = e.clientX;
                    e.preventDefault();
                }
                isDragging = true;
                card.classList.add('dragging');
            }
            
            function dragMove(e) {
                if (!isDragging) return;
                
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    e.preventDefault(); // Prevent scrolling
                } else {
                    currentX = e.clientX;
                }
                
                const deltaX = currentX - startX;
                
                // Move card and rotate slightly
                card.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
                
                // Show indicators based on direction
                const opacity = Math.min(Math.abs(deltaX) / 100, 1);
                const scale = 0.5 + (opacity * 0.5);
                if (deltaX < 0) {
                    indLeft.style.opacity = opacity;
                    indLeft.style.transform = `scale(${scale}) rotate(-15deg)`;
                    indRight.style.opacity = 0;
                    card.style.borderColor = 'var(--secondary)';
                    card.style.boxShadow = '0 0 30px var(--secondary-glow)';
                } else if (deltaX > 0) {
                    indRight.style.opacity = opacity;
                    indRight.style.transform = `scale(${scale}) rotate(15deg)`;
                    indLeft.style.opacity = 0;
                    card.style.borderColor = 'var(--primary)';
                    card.style.boxShadow = '0 0 30px var(--primary-glow)';
                }
            }
            
            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                card.classList.remove('dragging');
                
                const deltaX = currentX - startX;
                const threshold = 80;
                
                // Reset indicators
                indLeft.style.opacity = 0;
                indRight.style.opacity = 0;
                indLeft.style.transform = `scale(0.5) rotate(-15deg)`;
                indRight.style.transform = `scale(0.5) rotate(15deg)`;
                card.style.borderColor = 'var(--primary)';
                card.style.boxShadow = '0 0 30px var(--primary-glow), inset 0 0 20px rgba(10,224,254,0.1)';
                
                if (Math.abs(deltaX) > threshold && currentX !== 0) {
                    // Swiped far enough
                    if (deltaX < 0) {
                        checkAnswer('CHU_SO');
                    } else {
                        checkAnswer('SO');
                    }
                } else {
                    // Snap back
                    card.style.transform = '';
                }
            }
        }

        function checkAnswer(userChoice) {
            if (!currentCard) return;
            const card = currentCard;
            currentCard = null; // Prevent double trigger

            let isCorrect = false;
            let expectedType = currentCardValue < 10 ? 'CHU_SO' : 'SO';

            if (userChoice === expectedType) {
                isCorrect = true;
            }

            // Animate card completely off screen
            card.style.transform = ''; // Clear inline transform to allow class to take over
            if (userChoice === 'CHU_SO') {
                card.classList.add('swipe-left');
            } else {
                card.classList.add('swipe-right');
            }

            // Feedback
            feedbackEl.classList.remove('show');
            void feedbackEl.offsetWidth; // trigger reflow

            if (isCorrect) {
                score += 1;
                feedbackEl.innerText = "CHÍNH XÁC!";
                feedbackEl.style.color = "var(--success)";
                feedbackEl.style.textShadow = "0 0 20px rgba(78,255,159,0.8)";
            } else {
                if (isTrick && userChoice === 'CHU_SO') {
                    feedbackEl.innerHTML = "SAI RỒI!<br><span style='font-size:1.5rem'>Đó là 1 SỐ!</span>";
                } else {
                    feedbackEl.innerText = "SAI RỒI!";
                }
                feedbackEl.style.color = "var(--danger)";
                feedbackEl.style.textShadow = "0 0 20px rgba(255,0,85,0.8)";
            }
            
            feedbackEl.classList.add('show');
            scoreDisplay.innerText = score;

            setTimeout(() => {
                if (questionCount >= 10) {
                    endGame(false);
                } else {
                    questionCount++;
                    questionCountDisplay.innerText = questionCount;
                    spawnCard();
                }
            }, 300);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('startScreen').classList.contains('hidden') && 
                document.getElementById('gameOverScreen').classList.contains('hidden')) {
                if (e.key === 'ArrowLeft') {
                    // Show indicator briefly
                    indLeft.style.opacity = 1;
                    indLeft.style.transform = `scale(1) rotate(-15deg)`;
                    setTimeout(() => {
                        indLeft.style.opacity = 0;
                        indLeft.style.transform = `scale(0.5) rotate(-15deg)`;
                    }, 300);
                    checkAnswer('CHU_SO');
                } else if (e.key === 'ArrowRight') {
                    indRight.style.opacity = 1;
                    indRight.style.transform = `scale(1) rotate(15deg)`;
                    setTimeout(() => {
                        indRight.style.opacity = 0;
                        indRight.style.transform = `scale(0.5) rotate(15deg)`;
                    }, 300);
                    checkAnswer('SO');
                }
            }
        });
    </script>
</body>
</html>
