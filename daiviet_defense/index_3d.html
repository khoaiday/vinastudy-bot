<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a0a;touch-action:none;overscroll-behavior:none;}
#wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;}
#gameArea{position:relative;flex:1;overflow:hidden;}
#bgImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;}
#canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;}

/* HUD top — FR2 style */
#hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 10px;z-index:10;pointer-events:none;}
.hud-box{background:rgba(10,6,14,0.82);border:1px solid #C8960C;border-radius:8px;padding:4px 12px;font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700;color:#F5C842;display:flex;align-items:center;gap:5px;pointer-events:auto;}
.hud-hp{border-color:#C0332E;color:#FF6060;}
.hud-wave{border-color:rgba(200,150,12,0.4);font-size:12px;flex-direction:column;align-items:center;padding:3px 14px;}
.hud-wave .score{font-size:17px;color:#F5EED6;}
#btnSettings{background:rgba(10,6,14,0.82);border:1px solid #C8960C;border-radius:8px;width:38px;height:38px;font-size:18px;cursor:pointer;pointer-events:auto;}

/* Build bar bottom — FR2 style */
#buildBar{background:transparent;display:flex;align-items:center;padding:6px 8px;gap:0;flex-shrink:0;}
.ctrl-col{display:flex;flex-direction:column;gap:4px;margin-right:8px;flex-shrink:0;}
.ctrl-btn{background:rgba(10,6,14,0.82);border:1px solid #C8960C;border-radius:8px;width:44px;height:44px;font-size:20px;cursor:pointer;color:#C8960C;display:flex;align-items:center;justify-content:center;}
.ctrl-btn.speed-on{background:rgba(200,150,12,0.25);border-color:#F5C842;}
#towers{flex:1;display:flex;align-items:center;justify-content:space-evenly;}
.tower-btn{background:rgba(10,6,14,0.82);border:2px solid rgba(184,115,51,0.4);border-radius:50%;width:72px;height:72px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.tower-btn:active{transform:scale(0.94);}
.tower-btn.selected{border-color:#C8960C;background:rgba(200,150,12,0.2);box-shadow:0 0 10px rgba(200,150,12,0.4);}
.tower-btn.cant{opacity:0.4;cursor:not-allowed;}
.tbtn-icon{font-size:22px;}
.tbtn-name{font-size:8px;color:#C4B090;font-family:'Roboto Mono',monospace;}
.tbtn-cost{font-size:9px;color:#C8960C;font-family:'Roboto Mono',monospace;}
#btnMusic{background:rgba(10,6,14,0.82);border:1px solid #C8960C;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;flex-shrink:0;margin-left:8px;}

/* Pause menu */
#pause{display:none;position:absolute;inset:0;background:rgba(7,4,10,0.88);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#pause.open{display:flex;}
.pm-title{font-family:'Philosopher',serif;font-size:22px;font-weight:700;color:#F5C842;letter-spacing:2px;text-shadow:0 0 20px rgba(200,150,12,0.6);}
.pm-btn{width:220px;padding:14px;background:linear-gradient(135deg,#2A1A38,#1C1228);border:2px solid #C8960C;border-radius:10px;font-family:'Philosopher',serif;font-size:16px;font-weight:700;color:#F5C842;letter-spacing:1px;cursor:pointer;}
.pm-btn.danger{border-color:#C0332E;color:#FF8080;}

/* Tower info panel */
#towerInfo{display:none;position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(18,10,28,0.95);border:1px solid #C8960C;border-radius:12px;padding:12px 16px;z-index:20;min-width:200px;text-align:center;}
#towerInfo .ti-name{font-family:'Philosopher',serif;font-size:15px;color:#F5C842;margin-bottom:6px;}
#towerInfo .ti-stats{font-size:11px;color:#C4B090;font-family:'Roboto Mono',monospace;line-height:1.8;}
.ti-btns{display:flex;gap:8px;margin-top:10px;}
.ti-btn{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-family:'Philosopher',serif;font-size:13px;font-weight:700;}
.ti-upg{background:rgba(200,150,12,0.2);border:1px solid #C8960C;color:#F5C842;}
.ti-sell{background:rgba(192,51,46,0.15);border:1px solid #C0332E;color:#FF8080;}

/* Targeting Mode buttons */
.ti-mode{
  flex:1;min-width:42px;padding:4px 2px;
  background:rgba(22,14,28,0.6);border:1px solid rgba(184,115,51,0.4);
  border-radius:5px;color:#C4B090;font-size:9px;cursor:pointer;
  font-family:'Roboto Mono',monospace;transition:all 0.15s;
}
.ti-mode.active,.ti-mode:hover{
  background:rgba(200,150,12,0.25);border-color:#C8960C;color:#F5C842;
}

/* Consumable items styling */
.item-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(10,6,14,0.85);border:2px solid rgba(184,115,51,0.4);
  font-size:18px;cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;color:#F5C842;
}
.item-btn:active{transform:scale(0.9);}
.item-btn .item-count{
  position:absolute;bottom:-4px;right:-4px;
  background:#C0332E;color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:9px;font-family:'Roboto Mono',monospace;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;border:1px solid #1a0505;
}
.item-btn.disabled{
  opacity:0.3;cursor:not-allowed;pointer-events:none;
}

/* Pulse animation for glowing elements */
@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 12px #FF9900; }
  100% { transform: scale(1.08); box-shadow: 0 0 20px #FF9900, 0 0 6px #FF9900; }
}

/* Wave banner */
#waveBanner{position:absolute;top:20%;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,6,14,0.92);border:2px solid #C8960C;border-radius:12px;padding:10px 28px;font-family:'Philosopher',serif;font-size:18px;font-weight:700;color:#F5C842;letter-spacing:2px;z-index:30;opacity:0;transition:all .4s;pointer-events:none;}
#waveBanner.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Result screen */
#result{display:none;position:absolute;inset:0;background:rgba(7,4,10,0.9);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#result.open{display:flex;}
.result-title{font-family:'Philosopher',serif;font-size:28px;font-weight:700;letter-spacing:2px;}
.result-stars{font-size:36px;}
.result-stats{font-size:13px;color:#C4B090;font-family:'Roboto Mono',monospace;text-align:center;line-height:2;}
.result-btn{width:200px;padding:14px;border-radius:10px;font-family:'Philosopher',serif;font-size:16px;font-weight:700;cursor:pointer;}

@import url('https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Roboto+Mono:wght@400;600&display=swap');


</style>

<!-- Three.js overlay for animated 3D enemies -->
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

const glCanvas = document.getElementById('glCanvas');
const renderer = new THREE.WebGLRenderer({canvas:glCanvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000, 0);

// Enable dynamic WebGL shadow maps
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.add(new THREE.AmbientLight(0xffffff, 1.8));

// Directional Light shining from front-left (bottom-left on screen) to cast shadows back-right
const dir = new THREE.DirectionalLight(0xffffff, 1.6);
dir.position.set(200, 850, 650);
dir.castShadow = true;
dir.shadow.mapSize.width = 1024;
dir.shadow.mapSize.height = 1024;
dir.shadow.camera.near = 0.5;
dir.shadow.camera.far = 2000;
dir.shadow.camera.left = -900;
dir.shadow.camera.right = 900;
dir.shadow.camera.top = 700;
dir.shadow.camera.bottom = -700;
dir.shadow.bias = -0.0008;
scene.add(dir);
scene.add(dir.target);

// Transparent shadow ground plane to receive PBR character silhouette shadows on top of 2D canvas grass
const shadowPlaneGeo = new THREE.PlaneGeometry(3000, 3000);
const shadowPlaneMat = new THREE.ShadowMaterial({ opacity: 0.25 });
const shadowPlane = new THREE.Mesh(shadowPlaneGeo, shadowPlaneMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.set(400, 0, 300);
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// Orthographic camera — will be updated to match 2D canvas
// Orthographic camera in pixel space — updated each frame to match canvas size
const cam = new THREE.OrthographicCamera(0,800,0,600,0.1,2000);
cam.position.set(0,200,400); cam.lookAt(0,0,0);

// Load GLB models
const templates = {};
const clips = {};
const loader = new GLTFLoader();

// Debug helper function to output messages to the #debugContent div
function showDebug(msg) {
  const el = document.getElementById('debugContent');
  if (el) {
    // Keep last 6 lines of logs
    const lines = el.innerHTML.split('<br>').concat(msg);
    if (lines.length > 6) lines.shift();
    el.innerHTML = lines.join('<br>');
  }
  console.log(msg);
}

// ════════════════════════════════════════════════════
// 3D MODELS OFFSET & ATTACHMENTS TWEAKING CONSTANTS
// ════════════════════════════════════════════════════
// Adjust MESH_OFFSETS to center characters if they run off-center (e.g. running shifted to the right)
const MESH_OFFSETS = {
  scout:     { x: -0.3, y: 0.0, z: 0.0 }, // -0.3 left shift to compensate for "chạy lệch phải"
  normal:    { x: 0.0,  y: 0.0, z: 0.0 },
  heavy:     { x: 0.0,  y: 0.0, z: 0.0 },
  boss:      { x: 0.0,  y: 0.0, z: 0.0 },
  speedster: { x: 0.0,  y: 0.0, z: 0.0 },
  air:       { x: -0.3, y: 0.0, z: 0.0 }
};

// Adjust ROTATION_OFFSETS to make characters face forward in the direction of their movement
const ROTATION_OFFSETS = {
  scout:     Math.PI / 2, // 90 degrees counter-clockwise to align Tripo character perfectly forward!
  normal:    0.0,
  heavy:     0.0,
  boss:      0.0,
  speedster: 0.0,
  air:       Math.PI / 2  // same model
};

// Adjust these constants to fit the sword perfectly inside the character's hand bone!
// Meshy model: bone space ~0.1-0.3 units per limb, sword normalized to ~1.0
// Scale 0.15 = sword roughly same length as forearm
// Load unique models to prevent redundant network and memory overhead (60% network reduction!)
const UNIQUE_MODELS = {
  scout: './3d_assets/custom/enemy_scout.glb',
  normal: './3d_assets/custom/chibi_soldier.glb'
};

const KEY_MAPPING = {
  scout: 'scout',
  air: 'scout',
  normal: 'normal',
  heavy: 'normal',
  speedster: 'normal',
  boss: 'normal'
};

Object.entries(UNIQUE_MODELS).forEach(([key, path]) => {
  // Use static version string instead of Date.now() to allow browser caching!
  const cacheBustPath = path + '?v=1.0';
  loader.load(cacheBustPath, gltf => {
    // Populate templates and clips for all keys mapped to this unique model
    Object.entries(KEY_MAPPING).forEach(([mappedKey, sourceKey]) => {
      if (sourceKey === key) {
        templates[mappedKey] = gltf.scene;
        clips[mappedKey] = gltf.animations;
      }
    });
    
    // Diagnostic logging to quiet debug panel and check child nodes structure
    const nodes = [];
    gltf.scene.traverse(o => {
      if (o.name) nodes.push(`${o.type}|${o.name}`);
    });
    console.log(`[LoadModel] Loaded unique GLB ${key} scene has ${nodes.length} nodes.`);
    showDebug(`✅ GLB loaded for unique model "${key}"!`);
  });
});

// Track enemy 3D instances {enemyId → {mesh, mixer, action}}
const instances = new Map();

function cloneSkeletalModel(tpl) {
  const cloned = tpl.clone();
  cloned.traverse(obj => {
    if (obj.isSkinnedMesh && obj.skeleton) {
      const clonedBones = [];
      obj.skeleton.bones.forEach(originalBone => {
        const clonedBone = cloned.getObjectByName(originalBone.name);
        clonedBones.push(clonedBone || originalBone);
      });
      obj.skeleton = new THREE.Skeleton(clonedBones, obj.skeleton.boneInverses);
      obj.bind(obj.skeleton, obj.bindMatrix);
    }
  });
  return cloned;
}

function getOrCreate(en){
  const tplKey = templates[en.type] ? en.type : 'normal';
  const tpl = templates[tplKey];
  const tplClips = clips[tplKey] || [];
  
  if(!tpl) return null;
  if(instances.has(en)){
    return instances.get(en);
  }
  // Clone properly with skeletal re-binding
  const mesh = cloneSkeletalModel(tpl);
  
  // Enable dynamic shadow casting for all submeshes inside the character
  mesh.traverse(o => {
    if (o.isMesh) {
      o.castShadow = true;
      o.receiveShadow = false;
    }
  });
  
  // Position adjustments to center mesh (e.g. running shifted to the right)
  const offset = MESH_OFFSETS[tplKey] || { x: 0, y: 0, z: 0 };
  mesh.position.set(offset.x, offset.y, offset.z);
  
  // Wrap in a group for 2.5D tilt
  const group = new THREE.Group();
  group.add(mesh);
  // Tilt backwards relative to camera so we see the front/top at a beautiful 3/4 isometric angle
  group.rotation.x = -Math.PI / 2.6; // ~69 degrees tilt (extra isometric tilt)
  
  scene.add(group);
  
  let mixer = null;
  let action = null;
  if (tplClips.length > 0) {
    mixer = new THREE.AnimationMixer(mesh);
    const clip = tplClips[0]; // Assuming first clip is run/walk
    action = mixer.clipAction(clip);
    action.play();
  }
  
  // Base scale adjustment: 
  // 'scout' and 'air' are the new Tripo export (1.0). Old models need heavy scaling down.
  const baseScale = (tplKey === 'scout' || tplKey === 'air') ? 1.0 : 0.015; 
  
  const inst = {group, mesh, mixer, action, baseScale};
  instances.set(en, inst);
  return inst;
}

function canvasToWorld(cx, cy, W, H){
  // Convert canvas px → Three.js orthographic world coords
  return {
    x: (cx/W)*2 - 1,
    z: -((cy/H)*2 - 1)
  };
}

let lastGLTime = 0;
// Helper for smooth rotation
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

function glLoop(ts){
  requestAnimationFrame(glLoop);
  let dt = Math.min((ts-lastGLTime)/1000, 0.05) * (window._gameSpeed||1);
  lastGLTime = ts;

  if(!window._gameEnemies) {
    return;
  }

  if (window._gamePaused) {
    dt = 0; // Freeze movements and skeletal animations in 3D but allow matrix and tweak updates!
  }

  const W = glCanvas.offsetWidth, H = glCanvas.offsetHeight;
  renderer.setSize(W, H, false);

  // Dynamically position the shadow plane and light target at screen center to cover the entire field
  if (typeof shadowPlane !== 'undefined') {
    shadowPlane.position.set(W/2, 0, H/2);
  }
  if (typeof dir !== 'undefined') {
    dir.target.position.set(W/2, 0, H/2);
    // Position the light higher and closer to center to make character shadows smaller and shorter
    dir.position.set(W/2 - 180, 850, H/2 + 320);
  }

  // Camera: standard orthographic looking straight down to match 2D canvas perfectly (2.5D oblique style)
  cam.left = -W/2;
  cam.right = W/2;
  cam.top = H/2;
  cam.bottom = -H/2;
  cam.position.set(W/2, 1000, H/2);
  cam.up.set(0, 0, -1); // +Z is down on screen
  cam.lookAt(W/2, 0, H/2);
  cam.updateProjectionMatrix();

  const liveEnemies = new Set(window._gameEnemies);

  // Remove dead instances
  for(const [en, inst] of instances){
    if(!liveEnemies.has(en)){
      scene.remove(inst.mesh);
      instances.delete(en);
    }
  }

  // Update live + dying instances
  window._gameEnemies.forEach(en=>{
    if(en.escaped) return;
    const inst = getOrCreate(en);
    if(!inst) return;

    const cellW = window._cellW||50;
    const baseS = cellW * (en.def.scale||1) * inst.baseScale * 0.84;

    if(en.dead) {
      // Death animation: tip over + shrink + fade (cheap — no traverse)
      const t = 1 - Math.max(0, en.deathTimer / 0.5);
      inst.group.position.set(en.x, 0, en.y);
      inst.group.scale.setScalar(baseS * Math.max(0.05, 1 - t * 0.95));
      inst.group.rotation.z = t * Math.PI * 0.5; // tilt sideways (cheap)
      // One-time transparency setup
      if(!inst._deathReady) {
        inst._deathReady = true;
        inst.group.traverse(obj => {
          if(obj.isMesh && obj.material) {
            obj.material = obj.material.clone();
            obj.material.transparent = true;
          }
        });
      }
      inst.group.traverse(obj => {
        if(obj.isMesh && obj.material) obj.material.opacity = 1 - t;
      });
      return;
    }

    if(inst.mixer) inst.mixer.update(dt);
    inst.group.position.set(en.x, 0, en.y);
    inst.group.scale.setScalar(baseS);
    inst.mesh.rotation.x = 0; // reset tilt

    if (en.angle !== undefined) {
      const targetAngle = -en.angle;
      if (en.currentAngle === undefined) en.currentAngle = targetAngle;
      en.currentAngle = lerpAngle(en.currentAngle, targetAngle, dt * 10);
      const tKey = templates[en.type] ? en.type : 'normal';
      inst.mesh.rotation.y = en.currentAngle + (ROTATION_OFFSETS[tKey] !== undefined ? ROTATION_OFFSETS[tKey] : Math.PI / 2);
    }


  });

  renderer.render(scene, cam);
}
requestAnimationFrame(ts=>{lastGLTime=ts; glLoop(ts);});

// ════════════════════════════════════════════════════
// BFS WAYPOINT PATHFINDING
// ════════════════════════════════════════════════════
function calculateBFSPath(gridOverride = null, startNode = START) {
  const tempGrid = gridOverride || grid;
  const queue = [];
  const visited = Array.from({length:COLS},()=>Array(ROWS).fill(false));
  const parent = Array.from({length:COLS},()=>Array(ROWS).fill(null));

  queue.push(startNode);
  visited[startNode.x][startNode.y] = true;

  let pathFound = false;

  while (queue.length > 0) {
    const curr = queue.shift();

    if (curr.x === EXIT.x && curr.y === EXIT.y) {
      pathFound = true;
      break;
    }

    const dirs = [
      { dx: 1, dy: 0 },
      { dx: -1, dy: 0 },
      { dx: 0, dy: 1 },
      { dx: 0, dy: -1 }
    ];

    for (const d of dirs) {
      const nx = curr.x + d.dx;
      const ny = curr.y + d.dy;

      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
        if (!visited[nx][ny] && !tempGrid[nx][ny]) {
          visited[nx][ny] = true;
          parent[nx][ny] = curr;
          queue.push({ x: nx, y: ny });
        }
      }
    }
  }

  if (!pathFound) return null;

  const path = [];
  let curr = EXIT;
  while (curr !== null) {
    path.unshift(curr);
    curr = parent[curr.x][curr.y];
  }
  return path;
}

function recalculateEnemyPath(en) {
  if (en.def.isAir || en.dead || en.escaped) return;
  if (!en.inGrid) {
    en.myPath = calculateBFSPath(null, START);
    en.pathIndex = 0;
    return;
  }
  
  // Dùng vị trí pixel thực tế làm điểm xuất phát BFS
  const cx = Math.max(0, Math.min(COLS-1, Math.floor((en.x - offX) / cellW)));
  const cy = Math.max(0, Math.min(ROWS-1, Math.floor((en.y - offY) / cellH)));
  const startNode = {x: cx, y: cy};
  
  const newPath = calculateBFSPath(null, startNode);
  if (!newPath || newPath.length === 0) {
    // Không có đường — giữ path cũ, để anti-block xử lý
    return;
  }
  
  en.myPath = newPath;
  // pathIndex = 0: target là myPath[1] (ô tiếp theo từ vị trí hiện tại)
  en.pathIndex = 0;
}

function recalculateAllPaths() {
  enemies.forEach(en => {
    recalculateEnemyPath(en);
  });
}

function getRemainingDistanceToExit(en) {
  if (en.escaped || en.dead) return -99999;
  if (en.def.isAir || en.escaping) {
    return (W + cellW * 4) - en.x;
  }
  if (!en.inGrid) {
    const startCellCenter = offX + START.x * cellW + cellW/2;
    const distToStart = startCellCenter - en.x;
    const pathLength = calculateBFSPath(null, START)?.length || COLS;
    return distToStart + pathLength * cellW;
  }
  if (!en.myPath || en.myPath.length === 0 || en.pathIndex >= en.myPath.length) {
    return 99999;
  }
  
  const targetNode = en.myPath[en.pathIndex + 1];
  let distToNext = 0;
  if (targetNode) {
    const tx = offX + targetNode.x * cellW + cellW/2;
    const ty = offY + targetNode.y * cellH + cellH/2;
    distToNext = Math.sqrt((tx - en.x)**2 + (ty - en.y)**2);
  }
  
  const remainingCells = en.myPath.length - (en.pathIndex + 1);
  return distToNext + remainingCells * cellW;
}

// ════════════════════════════════════════════════════
// CANVAS INPUT
// ════════════════════════════════════════════════════
function getCell(e){
  const r=canvas.getBoundingClientRect();
  const px=(e.clientX||e.touches?.[0]?.clientX||0)-r.left;
  const py=(e.clientY||e.touches?.[0]?.clientY||0)-r.top;
  const gx=Math.floor((px-offX)/cellW);
  const gy=Math.floor((py-offY)/cellH);
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return null;
  return{x:gx,y:gy};
}

canvas.addEventListener('click',e=>{
  const cell=getCell(e);
  if(!cell)return;
  if(selectedTower){
    placeTower(cell.x,cell.y);
  } else if(grid[cell.x][cell.y]){
    openTowerInfo(cell.x,cell.y);
  } else {
    closeTowerInfo();
  }
});

// Recalculate Drum buffs (+25% / +35% / +50% DMG to surrounding 2-cell radius)
function updateTowerBuffs() {
  placedTowers.forEach(t => t.baseDmgBonus = 0);
  const powerTowers = placedTowers.filter(t => t.id === 'power');
  powerTowers.forEach(pt => {
    const buffPct = pt.level === 1 ? 0.25 : pt.level === 2 ? 0.35 : 0.50;
    placedTowers.forEach(t => {
      if (t === pt || t.id === 'power') return;
      const dx = Math.abs(t.gx - pt.gx);
      const dy = Math.abs(t.gy - pt.gy);
      if (dx <= 2 && dy <= 2) {
        t.baseDmgBonus = Math.max(t.baseDmgBonus, buffPct);
      }
    });
  });
}

function placeTower(gx,gy){
  if(grid[gx][gy])return;
  if(gx===START.x&&gy===START.y)return;
  if(gx===EXIT.x&&gy===EXIT.y)return;
  const def=TOWER_DEFS.find(t=>t.id===selectedTower);
  if(!def||gold<def.cost)return;
  
  grid[gx][gy]='block';
  
  // Verify if it blocks path from START to EXIT
  const mainPath = calculateBFSPath(grid, START);
  if(!mainPath){
    grid[gx][gy]=null;
    showBanner('⚠️ Không được chặn lối đi chính!',1200);
    return;
  }
  
  // Verify if it traps any active ground enemy
  let blocksEnemy = false;
  for (const en of enemies) {
    if (en.dead || en.escaped || en.def.isAir || en.escaping) continue;
    const cx = Math.max(0, Math.min(COLS-1, Math.floor((en.x - offX) / cellW)));
    const cy = Math.max(0, Math.min(ROWS-1, Math.floor((en.y - offY) / cellH)));
    // Luôn dùng pixel position thực tế, không dùng next waypoint
    const startNode = {x: cx, y: cy};
    let path = calculateBFSPath(grid, startNode);
    if (!path) {
      blocksEnemy = true;
      break;
    }
  }
  if (blocksEnemy) {
    grid[gx][gy]=null;
    showBanner('⚠️ Kẻ địch sẽ bị kẹt!',1200);
    return;
  }
  
  grid[gx][gy]=null;
  gold-=def.cost;
  const tower={
    id:def.id,def,gx,gy,level:1,lastShot:0,
    x:offX+gx*cellW+cellW/2,
    y:offY+gy*cellH+cellH/2,
    targetMode: 'first',
    baseDmgBonus: 0,
    isFiringFlame: 0,
    teslaChainTargets: null,
    teslaChainTime: 0
  };
  placedTowers.push(tower);
  grid[gx][gy]=tower;
  recalculateAllPaths();
  
  updateTowerBuffs();
  updateUI();
}

let selectedTowerObj=null;
function openTowerInfo(gx,gy){
  const t=grid[gx][gy];
  if(!t||!t.def)return;
  selectedTowerObj=t;
  const panel=document.getElementById('towerInfo');
  document.getElementById('tiName').textContent=`${t.def.emoji} ${t.def.name} Lv.${t.level}`;
  const upgCost=t.def.upgrade*t.level;
  
  const currentDmg = Math.round(t.def.dmg * t.level * (1 + t.baseDmgBonus));
  const statsText = t.id === 'power'
    ? `Tầm buff: ${t.def.range} ô\nHiệu ứng: Buff +${Math.round((t.level === 1 ? 25 : t.level === 2 ? 35 : 50))}% DMG\nNâng cấp: 💰${upgCost}\nBán: 💰${Math.floor(t.def.sell*t.level*0.8)}`
    : `Sát thương: ${currentDmg}\nTầm bắn: ${t.def.range}\nNâng cấp: 💰${upgCost}\nBán: 💰${Math.floor(t.def.sell*t.level*0.8)}`;

  document.getElementById('tiStats').textContent=statsText;
  
  const targetRow = document.getElementById('tiTargetRow');
  if (t.id === 'power' || t.id === 'mine') {
    targetRow.style.display = 'none';
  } else {
    targetRow.style.display = 'flex';
    document.querySelectorAll('.ti-mode').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === t.targetMode);
    });
  }

  panel.style.display='block';
}

function closeTowerInfo(){selectedTowerObj=null;document.getElementById('towerInfo').style.display='none';}

function upgradeTower(){
  if(!selectedTowerObj)return;
  const cost=selectedTowerObj.def.upgrade*selectedTowerObj.level;
  if(gold<cost)return;
  gold-=cost; selectedTowerObj.level++;
  updateTowerBuffs();
  openTowerInfo(selectedTowerObj.gx,selectedTowerObj.gy);
  updateUI();
}

function sellTower(){
  if(!selectedTowerObj)return;
  const t=selectedTowerObj;
  gold+=Math.floor(t.def.sell*t.level*0.8);
  placedTowers=placedTowers.filter(x=>x!==t);
  grid[t.gx][t.gy]=null;
  closeTowerInfo();
  recalculateAllPaths();
  
  updateTowerBuffs();
  updateUI();
}

window.setTargetMode = function(mode) {
  if (!selectedTowerObj) return;
  selectedTowerObj.targetMode = mode;
  document.querySelectorAll('.ti-mode').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
};

// ════════════════════════════════════════════════════
// FLOATING TEXT CLASS
// ════════════════════════════════════════════════════
class FloatingText {
  constructor(x, y, text, color = '#F5C842', size = 12, bold = true) {
    this.x = x + (Math.random() - 0.5) * 20;
    this.y = y - 10;
    this.text = text;
    this.color = color;
    this.size = size;
    this.bold = bold;
    this.alpha = 1.0;
    this.vy = -50 - Math.random() * 30;
    this.vx = (Math.random() - 0.5) * 20;
  }
  update(dt) {
    this.y += this.vy * dt;
    this.x += this.vx * dt;
    this.vy *= 0.95;
    this.alpha -= dt * 0.7; // fade out in ~1.4s
  }
  draw() {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `${this.bold ? 'bold ' : ''}${this.size}px 'Philosopher', serif`;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(10,6,14,0.9)';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.strokeText(this.text, this.x, this.y);
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════
// WAVE & SPAWN LOGIC
// ════════════════════════════════════════════════════
function startWave(){
  if(waveRunning||gameOver||wave>=MAX_WAVES)return;
  wave++;
  document.getElementById('btnPlay').style.opacity='0.4';
  waveRunning=true;
  spawnQueue=[...WAVES[wave-1]];
  spawnTimer=0;
  showBanner(`⚔️ Đợt ${wave}/${MAX_WAVES}`,1500);
  updateUI();
}

function spawnEnemy(type){
  const def=ENEMY_DEFS[type]||ENEMY_DEFS.scout;
  const en={
    type,def,
    hp:def.hp+wave*8, maxHp:def.hp+wave*8,
    speed:def.speed,
    slowTimer:0, slowStr:0,
    freezeTimer:0,
    myPath: calculateBFSPath(null, START),
    pathIndex: 0,
    inGrid: false,
    x:-cellW*2, y:offY+START.y*cellH+cellH/2,
    dead:false, escaped:false,
    frameTime:0, frame:0,
    angle: 0,
    currentAngle: 0
  };
  enemies.push(en);
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
let raf;
function gameLoop(ts){
  if(!paused&&!gameOver){
    const dt=Math.min((ts-lastTime)/1000*speed, 0.1);
    lastTime=ts;
    update(dt,ts);
  } else {lastTime=ts;}

  window._gameEnemies = enemies;
  window._gamePaused = paused;
  window._gameSpeed = speed;
  window._cellW = cellW;

  draw(ts);
  raf=requestAnimationFrame(gameLoop);
}

function update(dt,ts){
  // Spawn quái
  if(waveRunning&&spawnQueue.length>0){
    spawnTimer-=dt;
    if(spawnTimer<=0){
      spawnEnemy(spawnQueue.shift());
      spawnTimer=0.8;
    }
  }

  // Enemies update
  enemies.forEach(en=>{
    if(en.dead||en.escaped)return;
    
    // Slow decay
    if(en.slowTimer>0)en.slowTimer-=dt;
    
    // Freeze decay
    if(en.freezeTimer>0)en.freezeTimer-=dt;

    const isFrozen = en.freezeTimer > 0;
    const effSpeed= isFrozen ? 0 : (en.slowTimer>0?en.speed*(1-en.slowStr):en.speed)*cellW;

    // Stuckness watchdog — tự giải phóng lính bị kẹt (trigger sau 0.3s)
    if (!en._stuck) en._stuck = {x: en.x, y: en.y, t: 0};
    en._stuck.t += dt;
    const _movedDistSq = (en.x-en._stuck.x)**2+(en.y-en._stuck.y)**2;
    if (_movedDistSq > (cellW * 0.3)**2) {
      en._stuck = {x: en.x, y: en.y, t: 0}; // đang di chuyển bình thường
    } else if (en._stuck.t >= 0.3 && effSpeed > 0 && !isFrozen && en.inGrid) {
      // Kẹt > 0.3s — tái tính đường từ vị trí hiện tại
      recalculateEnemyPath(en);
      en._stuck = {x: en.x, y: en.y, t: 0};
    }

    // Wobble walk frame cycle
    en.frameTime+=dt;
    if(en.frameTime>0.12){en.frame=(en.frame+1)%4;en.frameTime=0;}

    // Mine checks
    const _activeMines = placedTowers.filter(t=>t.id==='mine'&&!t.isExploded);
    _activeMines.forEach(t => {
      if (true) {
        const d = Math.sqrt((en.x - t.x)**2 + (en.y - t.y)**2);
        if (d < cellW * 0.42) {
          t.isExploded = true;
          triggerScreenShake(12);
          showBanner('💥 BẪY CHÔNG KÍCH HOẠT!');
          
          const expRadius = cellW * 1.25;
          enemies.forEach(oth => {
            if (!oth.dead && !oth.escaped) {
              const od = Math.sqrt((oth.x - t.x)**2 + (oth.y - t.y)**2);
              if (od < expRadius) {
                const dmg = t.def.dmg * t.level;
                hitEnemy(oth, dmg, t.def);
                floatingTexts.push(new FloatingText(oth.x, oth.y, `-${Math.round(dmg)}💥`, '#C0332E', 13));
              }
            }
          });

          mineExplosions.push({x: t.x, y: t.y, radius: 0, maxRadius: expRadius, alpha: 1});

          setTimeout(() => {
            placedTowers = placedTowers.filter(x => x !== t);
            grid[t.gx][t.gy] = null;
            recalculateAllPaths();
          }, 40);
        }
      }
    });

    // Enemy target node resolution
    let tx, ty;
    const isAir = en.def.isAir;

    if (isAir) {
      tx = W + cellW * 4;
      ty = offY + EXIT.y * cellH + cellH/2;
    } else if (en.escaping) {
      tx = W + cellW * 4;
      ty = offY + EXIT.y * cellH + cellH/2;
    } else if (!en.inGrid) {
      tx = offX + START.x * cellW + cellW/2;
      ty = offY + START.y * cellH + cellH/2;
    } else {
      if (!en.myPath || en.myPath.length === 0) {
        en.myPath = calculateBFSPath(null, START);
        en.pathIndex = 0;
      }
      const targetNode = en.myPath[en.pathIndex + 1];
      if (!targetNode) {
        en.escaping = true;
        tx = W + cellW * 4;
        ty = offY + EXIT.y * cellH + cellH/2;
      } else {
        tx = offX + targetNode.x * cellW + cellW/2;
        ty = offY + targetNode.y * cellH + cellH/2;
      }
    }

    if (tx !== undefined && ty !== undefined && !isFrozen) {
      const dx = tx - en.x, dy = ty - en.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0.1) {
        en.angle = Math.atan2(dy, dx);
      }
      
      const moveStep = effSpeed * dt;
      if (dist <= moveStep) {
        en.x = tx;
        en.y = ty;
        if (!en.inGrid) {
          en.inGrid = true;
          en.pathIndex = 0;
        } else if (!isAir && !en.escaping) {
          en.pathIndex++;
        }
      } else {
        en.x += dx/dist * moveStep;
        en.y += dy/dist * moveStep;
      }
    }

    // Escape logic
    if (en.x > W + cellW * 3) {
      en.escaped = true;
      hp = Math.max(0, hp - 1);
      updateUI();
      if (hp <= 0) endGame(false);
    }
  });

  // Towers shoot logic
  const now=ts/1000;
  placedTowers.forEach(t=>{
    if(t.id === 'power') return;
    if(now-t.lastShot<t.def.rate/speed)return;
    const tx=t.x,ty=t.y;
    const _rangeSq=(t.def.range*cellW)**2;
    const inRange=enemies.filter(en=>{
      if(en.dead||en.escaped)return false;
      const dx=en.x-tx,dy=en.y-ty;
      return dx*dx+dy*dy<_rangeSq;
    });
    if(!inRange.length)return;
    
    // Choose target based on targeting mode
    let target = null;
    if (t.targetMode === 'first') {
      target = inRange.reduce((a,b) => getRemainingDistanceToExit(b) < getRemainingDistanceToExit(a) ? b : a);
    } else if (t.targetMode === 'last') {
      target = inRange.reduce((a,b) => getRemainingDistanceToExit(b) > getRemainingDistanceToExit(a) ? b : a);
    } else if (t.targetMode === 'strong') {
      target = inRange.reduce((a,b) => b.hp > a.hp ? b : a);
    } else if (t.targetMode === 'weak') {
      target = inRange.reduce((a,b) => b.hp < a.hp ? b : a);
    } else {
      target = inRange[0];
    }

    if(!target) return;
    t.lastShot=now;

    // Special weapon mechanisms
    if (t.id === 'flame') {
      inRange.forEach(en => {
        const dmg = t.def.dmg * t.level * (1 + t.baseDmgBonus) * dt * 0.5;
        hitEnemy(en, dmg, t.def);
      });
      t.isFiringFlame = 0.25;
    } else if (t.id === 'tesla') {
      const targets = [target];
      const extra = inRange.filter(e => e !== target);
      extra.sort((a,b) => {
        const da = (a.x-target.x)**2 + (a.y-target.y)**2;
        const db = (b.x-target.x)**2 + (b.y-target.y)**2;
        return da - db;
      });
      if (extra[0]) targets.push(extra[0]);
      if (extra[1]) targets.push(extra[1]);

      targets.forEach(tg => {
        const dmg = t.def.dmg * t.level * (1 + t.baseDmgBonus);
        hitEnemy(tg, dmg, t.def);
      });
      t.teslaChainTargets = targets.map(tg => ({x: tg.x, y: tg.y}));
      t.teslaChainTime = 0.15;
    } else {
      projectiles.push({
        x:tx,y:ty, startX:tx, startY:ty, tx:target.x,ty:target.y,
        target,def:t.def,level:t.level,
        dmgBonus: t.baseDmgBonus,
        speed:cellW*8,done:false, z: 0
      });
    }
  });

  // Projectiles update
  projectiles.forEach(p=>{
    if(p.done)return;
    const dx=p.target.x-p.x,dy=p.target.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<8){
      if(!p.target.dead){
        const dmg=p.def.dmg*p.level*(1+(p.dmgBonus||0))*(1+score/5000);
        if(p.def.splash){
          enemies.filter(en=>!en.dead&&!en.escaped).forEach(en=>{
            const ex=en.x-p.target.x,ey=en.y-p.target.y;
            if(Math.sqrt(ex*ex+ey*ey)<p.def.splash*cellW) hitEnemy(en,dmg,p.def);
          });
        } else {
          hitEnemy(p.target,dmg,p.def);
        }
      }
      p.done=true;
    } else {
      const spd=p.speed*dt;
      p.x+=dx/dist*spd; p.y+=dy/dist*spd;
      if (p.def.splash) {
         const totalDist = Math.sqrt((p.tx-p.startX)**2 + (p.ty-p.startY)**2);
         const currentDist = Math.sqrt((p.x-p.startX)**2 + (p.y-p.startY)**2);
         const progress = Math.min(1, currentDist / totalDist);
         p.z = Math.sin(progress * Math.PI) * totalDist * 0.3;
      }
    }
  });
  projectiles=projectiles.filter(p=>!p.done);
  enemies=enemies.filter(en=>!en.dead&&!en.escaped||(en.dead&&en.deathTimer>0));
  enemies.forEach(en=>{if(en.dead)en.deathTimer-=dt;});

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      comboTimer = 0; comboCount = 0;
    }
  }

  // Airstrike sweep line update
  if (airstrikeActive) {
    airstrikeX += 600 * dt;
    enemies.forEach(e => {
      if (!e.dead && !e.escaped && Math.abs(e.x - airstrikeX) < 42) {
        const dmg = 350; // Heavy sweep damage
        e.hp -= dmg;
        floatingTexts.push(new FloatingText(e.x, e.y, `-350⚡`, '#FF9900', 13));
        if (e.hp <= 0) {
          e.dead = true; e.deathTimer = 0.3;
          onEnemyKilled(e);
        }
      }
    });
    if (airstrikeX > W + 120) {
      airstrikeActive = false;
    }
  }

  // Mine explosions decay
  mineExplosions.forEach(exp => {
    exp.radius += 240 * dt;
    exp.alpha -= 2.2 * dt;
  });
  mineExplosions = mineExplosions.filter(exp => exp.alpha > 0);

  // Bomb Shockwave decay
  if (bombShockwaveActive) {
    bombShockwaveRadius += 1000 * dt;
    if (bombShockwaveRadius > W * 1.6) bombShockwaveActive = false;
  }

  // Visual timers for fire/sfx decay on towers
  placedTowers.forEach(t => {
    if (t.isFiringFlame > 0) t.isFiringFlame -= dt;
    if (t.teslaChainTime > 0) t.teslaChainTime -= dt;
  });

  // Screen shake decay
  if (screenShake > 0) {
    screenShake -= dt * 32;
    if (screenShake < 0) screenShake = 0;
  }

  // Floating text update
  floatingTexts.forEach(ft => ft.update(dt));
  floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);

  // Wave complete?
  if(waveRunning&&spawnQueue.length===0&&enemies.every(en=>en.dead||en.escaped)){
    waveRunning=false;
    document.getElementById('btnPlay').style.opacity='1';
    const reward=80+wave*15;
    gold+=reward;
    score+=reward;
    updateUI();
    showBanner(`✅ Đợt ${wave} hoàn thành! +${reward} vàng`,1800);
    if(wave>=MAX_WAVES)setTimeout(()=>endGame(true),2000);
  }
}

function hitEnemy(en,dmg,def){
  if (en.dead || en.escaped) return;
  en.hp-=dmg;
  if(def&&def.slow&&!en.def.slowImmune){en.slowTimer=2;en.slowStr=def.slow;}
  if(en.hp<=0){
    en.dead=true; en.deathTimer=0.3;
    gold+=en.def.reward; score+=en.def.reward*2;
    onEnemyKilled(en);
    updateUI();
  }
}

function onEnemyKilled(enemy) {
  comboCount++;
  comboTimer = 1.2;
  if (comboCount > highestCombo) highestCombo = comboCount;

  // Gold float text
  floatingTexts.push(new FloatingText(enemy.x, enemy.y, `+${enemy.def.reward}💰`, '#F5C842', 12));

  // Combo bonuses
  if (comboCount >= 8) {
    const bonus = 15 * comboCount;
    gold += bonus;
    floatingTexts.push(new FloatingText(enemy.x, enemy.y - 20, `⚡ MEGA x${comboCount}! +${bonus}💰`, '#FF4DFF', 18));
    gainAirstrike(25);
  } else if (comboCount >= 3) {
    const bonus = 5 * comboCount;
    gold += bonus;
    floatingTexts.push(new FloatingText(enemy.x, enemy.y - 16, `🔥 COMBO x${comboCount}! +${bonus}💰`, '#FF9900', 14));
    gainAirstrike(12);
  } else {
    gainAirstrike(4);
  }
  updateUI();
}

function gainAirstrike(pts) {
  airstrikeMeter = Math.min(AIRSTRIKE_MAX, airstrikeMeter + pts);
  updateAirstrikeUI();
}

function updateAirstrikeUI() {
  const fill = document.getElementById('airMeterFill');
  const btn = document.getElementById('airBtn');
  if (!fill || !btn) return;
  fill.style.height = `${airstrikeMeter}%`;
  
  if (airstrikeMeter >= AIRSTRIKE_MAX) {
    btn.style.opacity = '1';
    btn.style.boxShadow = '0 0 12px #FF9900, 0 0 4px #FF9900';
    btn.style.borderColor = '#FF9900';
    btn.style.animation = 'pulse 1s infinite alternate';
  } else {
    btn.style.opacity = '0.45';
    btn.style.boxShadow = 'none';
    btn.style.borderColor = 'rgba(200,150,12,0.4)';
    btn.style.animation = 'none';
  }
}

window.activateAirstrike = function() {
  if (airstrikeMeter < AIRSTRIKE_MAX || airstrikeActive || !waveRunning || gameOver) return;
  airstrikeMeter = 0;
  updateAirstrikeUI();

  airstrikeActive = true;
  airstrikeX = -50;
  triggerScreenShake(20);
  showBanner('⚡ ĐÒN TRỜI GIÁNG - TIÊU DIỆT KẺ THÙ!');

  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(255,160,0,0.24);z-index:200;pointer-events:none;animation:flashOut 0.4s forwards;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 450);
};

window.useItem = function(type) {
  const itm = itemStates.find(x => x.type === type);
  if (!itm || itm.count <= 0 || !waveRunning || gameOver) return;
  itm.count--;

  const btn = document.getElementById('ibtn_' + type);
  if (btn) {
    const badge = btn.querySelector('.item-count');
    if (badge) badge.textContent = itm.count;
    if (itm.count <= 0) btn.classList.add('disabled');
  }

  if (type === 'bomb') {
    triggerScreenShake(15);
    enemies.forEach(e => {
      if (!e.dead && !e.escaped) {
        const dmg = e.maxHp * 0.5;
        e.hp -= dmg;
        floatingTexts.push(new FloatingText(e.x, e.y - 12, `-${Math.round(dmg)}💥`, '#C0332E', 13));
        if (e.hp <= 0) {
          e.dead = true; e.deathTimer = 0.3;
          onEnemyKilled(e);
        }
      }
    });
    bombShockwaveActive = true;
    bombShockwaveRadius = 0;
    showBanner('💣 BOM THẦN NỔ - DIỆT 50% HP ĐỊCH!');
  } else if (type === 'freeze') {
    enemies.forEach(e => {
      if (!e.dead && !e.escaped && !e.def.slowImmune) {
        e.freezeTimer = 5.0;
        floatingTexts.push(new FloatingText(e.x, e.y - 12, '❄️ Freeze', '#3a86ff', 12));
      }
    });
    showBanner('❄️ ĐÔNG BĂNG TOÀN BỘ 5 GIÂY!');
  } else if (type === 'gold') {
    gold += 150;
    floatingTexts.push(new FloatingText(W/2, H/2 - 50, '+150💰', '#F5C842', 24));
    showBanner('💰 +150 VÀNG ĐÔNG SƠN!');
    updateUI();
  }
};

function getEnemyGridCell(en) {
  const gx = Math.max(0, Math.min(COLS-1, Math.floor((en.x - offX) / cellW)));
  const gy = Math.max(0, Math.min(ROWS-1, Math.floor((en.y - offY) / cellH)));
  return { x: gx, y: gy };
}

function triggerScreenShake(intensity) {
  screenShake = intensity;
}

// ════════════════════════════════════════════════════
// DRAW GAME LAYOUT & EFFECTS
// ════════════════════════════════════════════════════
function draw(ts){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if (screenShake > 0) {
    const dx = (Math.random() - 0.5) * screenShake;
    const dy = (Math.random() - 0.5) * screenShake;
    ctx.translate(dx, dy);
  }

  // Grid (cached offscreen canvas — redraws only on resize)
  if (!draw._gridCache || draw._gridW !== W || draw._gridH !== H) {
    const oc = document.createElement('canvas'); oc.width=W; oc.height=H;
    const ox = oc.getContext('2d');
    ox.strokeStyle='rgba(30,60,20,0.3)'; ox.lineWidth=1;
    for(let cc=0;cc<=COLS;cc++){ox.beginPath();ox.moveTo(offX+cc*cellW,offY);ox.lineTo(offX+cc*cellW,offY+ROWS*cellH);ox.stroke();}
    for(let rr=0;rr<=ROWS;rr++){ox.beginPath();ox.moveTo(offX,offY+rr*cellH);ox.lineTo(offX+COLS*cellW,offY+rr*cellH);ox.stroke();}
    draw._gridCache=oc; draw._gridW=W; draw._gridH=H;
  }
  ctx.drawImage(draw._gridCache,0,0);

  // Path row tint
  ctx.fillStyle='rgba(140,110,65,0.25)';
  ctx.fillRect(offX,offY+START.y*cellH,COLS*cellW,cellH);

  // Tower placement hover range
  if(selectedTower){
    const def=TOWER_DEFS.find(t=>t.id===selectedTower);
    if(def){
      const mx=canvas._mx,my=canvas._my;
      if(mx!==undefined){
        const gx=Math.floor((mx-offX)/cellW),gy=Math.floor((my-offY)/cellH);
        if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS&&!grid[gx][gy]){
          ctx.fillStyle='rgba(200,150,12,0.25)';
          ctx.fillRect(offX+gx*cellW+1,offY+gy*cellH+1,cellW-2,cellH-2);
          ctx.strokeStyle='rgba(200,150,12,0.8)';ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(offX+gx*cellW+cellW/2,offY+gy*cellH+cellH/2,def.range*cellW,0,Math.PI*2);ctx.stroke();
        }
      }
    }
  }

  // Drawing Towers
  placedTowers.forEach(t=>{
    // Buffed base highlight
    if (t.baseDmgBonus > 0) {
      ctx.fillStyle = 'rgba(200, 150, 12, 0.18)';
      ctx.beginPath(); ctx.arc(t.x, t.y, cellW*0.48, 0, Math.PI*2); ctx.fill();
    }
    
    // Tower base
    ctx.fillStyle='rgba(10,6,14,0.7)';
    ctx.beginPath();ctx.arc(t.x,t.y,cellW*0.42,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=t.def.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(t.x,t.y,cellW*0.42,0,Math.PI*2);ctx.stroke();
    
    // Tower emoji
    ctx.font=`${cellH*0.55}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.def.emoji,t.x,t.y);
    
    // Star dots for Level
    for(let i=0;i<t.level;i++){
      ctx.fillStyle=t.def.color;
      ctx.beginPath();ctx.arc(t.x-6+(i*6),t.y+cellH*0.38,3,0,Math.PI*2);ctx.fill();
    }
    
    // Range circle for selected
    if(selectedTowerObj===t){
      ctx.strokeStyle='rgba(200,150,12,0.4)';ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(t.x,t.y,t.def.range*cellW,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Special visuals
    if (t.id === 'flame' && t.isFiringFlame > 0) {
      ctx.fillStyle = 'rgba(255, 102, 0, 0.22)';
      ctx.strokeStyle = 'rgba(255, 153, 0, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.def.range * cellW, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
    }

    if (t.id === 'tesla' && t.teslaChainTime > 0 && t.teslaChainTargets) {
      ctx.strokeStyle = '#3a86ff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#3a86ff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(t.x, t.y);
      t.teslaChainTargets.forEach(tg => {
        const steps = 4;
        let lastX = t.x, lastY = t.y;
        for (let i = 1; i <= steps; i++) {
          const ratio = i / steps;
          const tx = t.x + (tg.x - t.x) * ratio + (Math.random() - 0.5) * 12;
          const ty = t.y + (tg.y - t.y) * ratio + (Math.random() - 0.5) * 12;
          ctx.lineTo(tx, ty);
        }
      });
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  });

  // HP overlay on 3D meshes
  enemies.forEach(en=>{
    if(en.dead&&en.deathTimer<=0)return;

    // 2D Ground Shadow Fallback (Now handled dynamically by WebGL Shadow Maps in Three.js!)
    /*
    ctx.fillStyle = 'rgba(0, 0, 0, 0.26)';
    ctx.beginPath();
    ctx.ellipse(
      en.x + cellW * 0.15,            // Shifted right (away from left-side light)
      en.y - cellH * 0.05,            // Shifted slightly up/backwards
      cellW * 0.32,                   // Slanted shadow length
      cellH * 0.13,                   // Slanted shadow width
      -Math.PI / 6,                   // -30 degrees slanted rotation
      0, 
      Math.PI * 2
    );
    ctx.fill();
    */

    const sz=cellH*(en.def.scale||1)*0.84;
    const bw=cellW*0.5, bh=5, bx=en.x-bw/2, by=en.y-sz*2.5;
    
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
    
    ctx.fillStyle=en.hp/en.maxHp>0.4?'#4CAF50':'#F44336';
    const fillW = Math.max(0, bw * (en.hp/en.maxHp));
    if(fillW > 0){
      ctx.beginPath(); ctx.roundRect(bx, by, fillW, bh, 3); ctx.fill();
    }

    // Freeze & Slow overlays
    if (en.freezeTimer > 0) {
      ctx.fillStyle = 'rgba(58, 134, 255, 0.35)';
      ctx.strokeStyle = '#3a86ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(en.x, en.y, cellH * 0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.fillText('❄️', en.x, en.y - 4);
    } else if (en.slowTimer > 0) {
      ctx.fillStyle = 'rgba(90, 188, 170, 0.25)';
      ctx.strokeStyle = '#5ABCAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(en.x, en.y, cellH * 0.35, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
    }
  });

  // Projectiles
  projectiles.forEach(p=>{
    ctx.fillStyle=p.def.color||'#FFD700';
    ctx.beginPath();
    ctx.arc(p.x, p.y - (p.z||0), p.def.splash ? 6 : 4, 0, Math.PI*2);
    ctx.fill();
    if(p.def.splash){
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(p.x, p.y, 4, 2, 0, 0, Math.PI*2); ctx.fill();
    }
  });

  // Mine Explosions
  mineExplosions.forEach(exp => {
    ctx.strokeStyle = `rgba(192, 51, 46, ${exp.alpha})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = `rgba(245, 200, 12, ${exp.alpha * 0.25})`;
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI*2);
    ctx.fill();
  });

  // Airstrike sweeping line
  if (airstrikeActive) {
    const gradient = ctx.createLinearGradient(airstrikeX - 70, 0, airstrikeX, 0);
    gradient.addColorStop(0, 'rgba(255, 69, 0, 0)');
    gradient.addColorStop(0.5, 'rgba(255, 69, 0, 0.45)');
    gradient.addColorStop(1, 'rgba(255, 215, 0, 0.85)');
    ctx.fillStyle = gradient;
    ctx.fillRect(airstrikeX - 70, 0, 70, H);
    
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3.5;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(airstrikeX, 0);
    ctx.lineTo(airstrikeX, H);
    ctx.stroke();
    ctx.shadowBlur = 0; // reset blur
  }

  // Bomb shockwave
  if (bombShockwaveActive) {
    ctx.strokeStyle = 'rgba(255, 69, 0, 0.65)';
    ctx.lineWidth = 7;
    ctx.shadowColor = '#FF4500';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(W/2, H/2, bombShockwaveRadius, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Render floating texts on top
  floatingTexts.forEach(ft => ft.draw());

  // Render Active Combo Banner (FR2 HUD Style, top center)
  if (comboCount >= 3) {
    ctx.font = `bold ${comboCount >= 8 ? 26 : 20}px 'Philosopher', serif`;
    ctx.fillStyle = comboCount >= 8 ? '#FF4DFF' : '#FF9900';
    ctx.strokeStyle = 'rgba(10,6,14,0.95)';
    ctx.lineWidth = 4;
    ctx.textAlign = 'center';
    const text = comboCount >= 8 ? `⚡ MEGA COMBO x${comboCount} ⚡` : `🔥 COMBO x${comboCount} 🔥`;
    const cy = H * 0.16;
    ctx.strokeText(text, W / 2, cy);
    ctx.fillText(text, W / 2, cy);
  }

  ctx.restore();
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  canvas._mx=e.clientX-r.left; canvas._my=e.clientY-r.top;
});

// ════════════════════════════════════════════════════
// UI & BACKEND API CONNECT
// ════════════════════════════════════════════════════
function updateUI(){
  const _s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  _s('gold',gold); _s('hp',hp); _s('wave',wave); _s('score',score);
  updateTowerButtons();
}

let bannerTimer=null;
function showBanner(text,ms=2000){
  const el=document.getElementById('waveBanner');
  el.textContent=text; el.classList.add('show');
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

function togglePause(){
  paused=!paused;
  document.getElementById('pause').classList.toggle('open',paused);
}

function toggleSpeed(){
  speed=speed===1?2:1;
  document.getElementById('btnSpeed').classList.toggle('speed-on',speed===2);
}

function toggleMusic(){
  const bgm=document.getElementById('bgm');
  if(musicOn){bgm.pause();musicOn=false;document.getElementById('musicBtn').textContent='🔇';}
  else{bgm.volume=0.4;bgm.play().catch(()=>{});musicOn=true;document.getElementById('musicBtn').textContent='🔊';}
}

function syncCompleteAi(stars) {
  const payload = {
    tg_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 12345,
    ai_num: aiNum,
    score: score,
    stars: stars
  };

  fetch('/api/student/complete-ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    console.log('✅ Progress successfully saved to server database:', data);
  })
  .catch(err => {
    console.error('❌ Failed to save progress to server:', err);
  });
}

function endGame(win){
  gameOver=true;
  const stars=win?(hp>20?3:hp>10?2:1):0;
  document.getElementById('resultTitle').textContent=win?'🏆 CHIẾN THẮNG!':'💀 THẤT BẠI';
  document.getElementById('resultTitle').style.color=win?'#F5C842':'#FF6060';
  document.getElementById('resultStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('resultStats').innerHTML=`Điểm: ${score}<br>Đợt hoàn thành: ${wave}/${MAX_WAVES}<br>HP còn lại: ${hp}/${START_HP}`;
  document.getElementById('result').classList.add('open');

  if (win) {
    syncCompleteAi(stars);
  }
}

document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchstart',e=>{
  if(e.touches.length>1)e.preventDefault();
  const r=canvas.getBoundingClientRect();
  canvas._mx=e.touches[0].clientX-r.left;
  canvas._my=e.touches[0].clientY-r.top;
},{passive:false});

loadLoadout();
updateUI();
requestAnimationFrame(ts=>{lastTime=ts;gameLoop(ts);});
